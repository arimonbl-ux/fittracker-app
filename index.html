// ─── SAVE STATUS COMPONENT ───────────────────────────────────────────────────
function SaveStatus({status, message, onRetry}) {
  if(!status) return null;

  let bgColor = G.alt, textColor = G.mu, icon = '...';
  if(status === 'saving') {
    bgColor = G.acc + '22';
    textColor = G.acc;
    icon = '\u{27F3}';
  } else if(status === 'saved') {
    bgColor = G.ok + '22';
    textColor = G.ok;
    icon = '\u{2713}';
  } else if(status === 'error') {
    bgColor = G.bad + '22';
    textColor = G.bad;
    icon = '\u{2717}';
  }

  return (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:bgColor,borderRadius:6,fontSize:15,color:textColor,whiteSpace:'nowrap'}}>
      <span style={status==='saving'?{animation:'spin 1s linear infinite'}:{}}>{icon}</span>
      <span>{message}</span>
      {status==='error' && onRetry && (
        <button onClick={onRetry} style={{background:'none',color:textColor,border:'1px solid '+textColor,borderRadius:3,padding:'1px 6px',fontSize:15,marginLeft:4}}>Reintentar</button>
      )}
    </div>
  );
}

// ─── COACH DEL DIA: genera recomendaciones automaticas hoy + manana ─────────
// Analiza tendencias de los ultimos 7 dias + estado actual y produce consejos
// cientificos para el resto del dia y una preview del dia siguiente.
function CoachDelDia({user, cfg, fecha, dia, meta, reg}) {
  const [loading, setLoading] = useState(true);
  const [trends, setTrends] = useState(null);
  const [collapsed, setCollapsed] = useState(false);

  useEffect(() => {
    let cancel = false;
    (async () => {
      setLoading(true);
      try {
        const {data: rows} = await sb.from('sesiones_entreno')
          .select('fecha,dia_semana,notas,ejercicios')
          .eq('user_id', user.id)
          .lte('fecha', fecha)
          .order('fecha', {ascending:false})
          .limit(10);
        const {data: nRows} = await sb.from('nutricion')
          .select('fecha,totales,notas')
          .eq('user_id', user.id)
          .neq('fecha', '2099-12-31')
          .lte('fecha', fecha)
          .order('fecha', {ascending:false})
          .limit(7);
        const sleeps = [], calidades = [], obsHoy = [];
        let rir0Hoy = 0, rir0Sem = 0, fallosHoy = 0, setsHoy = 0;
        let ansiedadHoy = null, fatigaHoy = null;
        const fechasUnicas = new Set();
        for(const r of (rows||[])) {
          let n = {}; try { n = JSON.parse(r.notas||'{}'); } catch {}
          if(!fechasUnicas.has(r.fecha)) {
            fechasUnicas.add(r.fecha);
            if(n.sueno) sleeps.push(parseFloat(n.sueno));
            if(n.suenoCalidad) calidades.push(parseFloat(n.suenoCalidad));
          }
          if(r.fecha === fecha && n.obs) obsHoy.push(n.obs);
          if(r.fecha === fecha) {
            if(n.aPost) ansiedadHoy = parseInt(n.aPost);
            if(n.fPost) fatigaHoy = parseInt(n.fPost);
          }
          const ej = r.ejercicios || {};
          Object.values(ej).forEach(bl => {
            if(bl && typeof bl === 'object') {
              Object.values(bl).forEach(s => {
                const rir = parseInt(s.rir);
                const reps = parseInt(s.reps||'0');
                if(reps > 0) {
                  if(r.fecha === fecha) { setsHoy++; if(rir === 0) rir0Hoy++; }
                  if(rir === 0) rir0Sem++;
                  if(s.notas && /fallo/i.test(s.notas) && r.fecha === fecha) fallosHoy++;
                }
              });
            }
          });
        }
        const nutHoy = (nRows||[]).find(x => x.fecha === fecha);
        const avgSleep = sleeps.length ? sleeps.reduce((a,b)=>a+b,0)/sleeps.length : null;
        const avgCal = calidades.length ? calidades.reduce((a,b)=>a+b,0)/calidades.length : null;
        const metaSueno = (cfg.metas && cfg.metas.suenoOpt) || 7;
        const debtHoras = avgSleep !== null ? Math.max(0, (metaSueno - avgSleep) * sleeps.length) : 0;
        if(!cancel) setTrends({avgSleep, avgCal, debtHoras, sleeps, rir0Hoy, rir0Sem, setsHoy, fallosHoy, obsHoy, ansiedadHoy, fatigaHoy, nutHoy, sleepsCount:sleeps.length, metaSueno});
      } catch(e) { console.error('CoachDelDia error', e); }
      if(!cancel) setLoading(false);
    })();
    return () => { cancel = true; };
  }, [fecha, user.id]);

  const buildAdvice = () => {
    if(!trends) return [];
    const advice = [];
    const suenoHoy = parseFloat(meta.sueno||'0');
    const calHoy = parseFloat(meta.suenoCalidad||'0');
    const ePost = parseInt(meta.ePost||'0');
    const pump = parseInt(meta.pump||'0');
    const obsTxt = (meta.obs||'') + ' ' + trends.obsHoy.join(' ');
    const afectSueno = /sue.?o/i.test(obsTxt);
    const fatigaObs = /fatiga|pesad|cansa/i.test(obsTxt);

    // 1. Alerta sueno semanal
    if(trends.avgSleep !== null && trends.avgSleep < 6.3 && trends.sleepsCount >= 3) {
      advice.push({
        nivel:'warn',
        titulo:'Deuda de sueno acumulada',
        texto:'Promedio ultimas '+trends.sleepsCount+' noches: '+trends.avgSleep.toFixed(1)+'h (meta '+trends.metaSueno+'h). Deuda total ~'+trends.debtHoras.toFixed(0)+'h. Prioridad: cama 21:30 hoy, apagado 22:00. Magnesio glicinato 400mg + K2 90mcg + 0.3-0.5mg melatonina 30 min antes. Cero pantallas post 20:30.',
        ref:'Leproult 1997, Walker 2017'
      });
    }
    // 2. Sueno corto anoche especifico
    if(suenoHoy && suenoHoy < 5.8) {
      advice.push({
        nivel:'bad',
        titulo:'Sueno corto anoche ('+suenoHoy.toFixed(1)+'h)',
        texto:'Resto del dia: siesta 20-30 min entre 13-15h (no mas, no toca adenosina nocturna). Sin cafeina despues de 12:00. Hidratacion 1L extra con electrolitos (1g sal + K+). Evitar decisiones de alta carga cognitiva. Cortex prefrontal operando ~70%.',
        ref:'Killgore 2010, Lovato 2010'
      });
    }
    // 3. Trabajo al fallo alto hoy
    if(trends.rir0Hoy >= 3) {
      advice.push({
        nivel:'warn',
        titulo:trends.rir0Hoy+' sets al fallo hoy',
        texto:'Recuperacion 48-72h requerida. Post-entreno extendido: omega-3 3g + vit C 500mg + ashwagandha 600mg extra para bajar cortisol (Salehi 2019 reduce 27%). Proteina total dia 2.0-2.2g/kg. Evitar cualquier otro estimulo neural intenso hoy (ni WOD extra, ni sesion de tecnica pesada).',
        ref:'Salehi 2019, Helms 2018, Israetel MRV'
      });
    }
    // 4. Post energia baja + fatiga
    if(ePost && ePost <= 5 || (trends.fatigaHoy !== null && trends.fatigaHoy >= 7)) {
      advice.push({
        nivel:'bad',
        titulo:'Fatiga post-entreno elevada',
        texto:'Comida principal en las proximas 2h: 40g proteina + grasa saludable (aguacate 100g + aceite oliva) + verduras fibrosas. Mantener keto pero NO deficit hoy. Recuperacion > progresion.',
        ref:'Phinney, Volek 2011'
      });
    }
    // 5. Si el usuario escribio algo en obs que menciona dolor
    if(/dolor|molest|pinch/i.test(obsTxt)) {
      advice.push({
        nivel:'bad',
        titulo:'Dolor reportado en sesion',
        texto:'Revisar tecnica/angulo del ejercicio mencionado. Aplicar frio 10 min + movilidad suave. Si persiste 48h suspender ejercicio especifico y consultar fisioterapeuta. Registrar en notas del proximo entreno si continua.',
        ref:'ACSM guidelines'
      });
    }
    // 6. Hidratacion / intra recordatorio si ya entreno
    if(trends.setsHoy > 5) {
      advice.push({
        nivel:'info',
        titulo:'Post-entreno logistica',
        texto:'Proxima sesion: integrar agua de coco 250ml intra (13g CHO, 470mg K+, 25mg Mg) + sal rosada 1g + EAA. Previene fatiga por deficit de electrolitos bajo cargas altas.',
        ref:'Saat 2002, Ismail 2007'
      });
    }

    // 7. Consejo para MANANA
    const mDia = (dia % 7) + 1;
    const mProg = (cfg.prog && cfg.prog[mDia]) || null;
    if(mProg) {
      const intens = (mProg.tipo || 'media').toLowerCase();
      const dName = ['','Lun','Mar','Mie','Jue','Vie','Sab','Dom'][mDia];
      let texto = dName+': '+mProg.nombre+' ('+intens.toUpperCase()+'). ';
      let nivel = 'info';
      if(trends.avgSleep !== null && trends.avgSleep < 6.3 && (intens === 'alta' || intens === 'crossfit')) {
        nivel = 'warn';
        texto += 'Con deuda de sueno actual, convertir en DELOAD: -15/20% peso, RIR minimo 2, cero fallo, cero PRs. Si amaneces con <6.5h de sueno, reducir volumen tambien (-1 set por ejercicio). Si dormis 7h+, sesion normal pero capada a RIR1.';
      } else if(intens === 'alta') {
        texto += 'Pre: L-Arginina 5g 20 min antes + EAA 10g + Colageno + Ashwa + cafe. Miel 15g en cafe si hay piernas. Intra: agua de coco 250ml + sal + EAA. Post: Carnivor + creatina 5g + glutamina 5g + papa 100g. Objetivo: RIR 1-2 en todo, fallo solo ultimo set de aislamiento.';
      } else if(intens === 'crossfit') {
        texto += 'Escalar WOD si hay dolor articular o deuda de sueno. Agua de coco intra obligatoria. Si hay impacto alto (box, burpees, doble under) y tenes tendon o articulacion sensible hoy, sustituir por remo o bike.';
      } else if(intens === 'media') {
        texto += 'Intensidad moderada: RPE 7-8, tecnica sobre peso. Ideal para trabajo de debilidades (postura, cadencia, range of motion).';
      } else if(intens === 'descanso') {
        nivel = 'ok';
        texto += 'Recuperacion activa: paseo 30 min al sol, estiramiento 15 min, yoga/movilidad suave. Sin cargas. Alimentacion: mantener keto, proteina 1.6g/kg, hidratacion 3L+.';
      }
      if(mProg.cardio) texto += ' Cardio: '+mProg.cardio+'.';
      advice.push({nivel, titulo:'Manana ('+dName+')', texto, ref:'NSCA, Helms RP'});
    }

    // Default OK si nada
    if(advice.length === 0) {
      advice.push({nivel:'ok', titulo:'Todo en verde', texto:'Sin alertas criticas. Mantener hidratacion, protocolo de ayuno y registrar entreno al finalizar. Sueno promedio semanal: '+(trends.avgSleep!==null?trends.avgSleep.toFixed(1)+'h':'sin datos')+'.', ref:''});
    }
    return advice;
  };

  if(loading) {
    return React.createElement('div', {style:{background:'rgba(255,255,255,0.82)',backdropFilter:'saturate(180%) blur(18px)',WebkitBackdropFilter:'saturate(180%) blur(18px)',border:'1px solid rgba(60,60,67,0.12)',borderRadius:16,padding:16,marginBottom:14,fontSize:13,color:G.mu,display:'flex',alignItems:'center',gap:8}},
      React.createElement('span', {style:{animation:'spin 1s linear infinite'}}, '\u{27F3}'),
      'Analizando datos y generando recomendaciones...'
    );
  }
  const advices = buildAdvice();
  const colorMap = {ok:G.ok, info:G.acc, warn:G.warn, bad:G.bad};
  const iconMap = {ok:'\u2705', info:'\u{1F4A1}', warn:'\u26A0\uFE0F', bad:'\u{1F6A8}'};

  return React.createElement('div', {style:{background:'rgba(255,255,255,0.82)',backdropFilter:'saturate(180%) blur(18px)',WebkitBackdropFilter:'saturate(180%) blur(18px)',border:'1px solid rgba(0,122,255,0.25)',borderRadius:16,padding:16,marginBottom:14,boxShadow:'0 1px 3px rgba(0,0,0,0.04),0 8px 28px rgba(0,122,255,0.08)'}},
    React.createElement('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:collapsed?0:12,cursor:'pointer'}, onClick:()=>setCollapsed(!collapsed)},
      React.createElement('div', {style:{display:'flex',alignItems:'center',gap:8}},
        React.createElement('span', {style:{fontSize:18}}, '\u{1F9E0}'),
        React.createElement('div', {style:{fontSize:13,letterSpacing:0.6,color:G.acc,fontWeight:700,textTransform:'uppercase'}}, 'Coach del Dia'),
        React.createElement('span', {style:{fontSize:11,color:G.mu,background:G.alt,padding:'2px 8px',borderRadius:10}}, advices.length + (advices.length===1?' consejo':' consejos'))
      ),
      React.createElement('span', {style:{fontSize:12,color:G.mu}}, collapsed?'\u25BC':'\u25B2')
    ),
    !collapsed && React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:10}},
      advices.map((a, i) => {
        const c = colorMap[a.nivel] || G.acc;
        return React.createElement('div', {key:i, style:{background:c+'0D',border:'1px solid '+c+'44',borderRadius:12,padding:'11px 13px'}},
          React.createElement('div', {style:{fontWeight:700,color:c,fontSize:13,marginBottom:5,display:'flex',alignItems:'center',gap:7}},
            React.createElement('span', {style:{fontSize:15}}, iconMap[a.nivel]||'\u{1F4A1}'),
            React.createElement('span', null, a.titulo)
          ),
          React.createElement('div', {style:{color:G.dim,fontSize:14,lineHeight:1.5}}, a.texto),
          a.ref && React.createElement('div', {style:{fontSize:11,color:G.mu,marginTop:5,fontStyle:'italic'}}, 'Ref: '+a.ref)
        );
      })
    )
  );
}

// ─── TAB ENTRENO ─────────────────────────────────────────────────────────────
function TabEntreno({user, cfg}) {
  const [dia, setDia] = useState(diaHoy());
  const [fecha, setFecha] = useState(hoy());
  const [reg, setReg] = useState({});
  const [meta, setMeta] = useState({inicio:'',fin:'',durMin:'',sueno:'',suenoCalidad:'',despertares:'',horaAcostarse:'',ayuno:'',ultimaIngesta:'',ePre:'',fPre:'',hPre:'',aPre:'',ePost:'',fPost:'',hPost:'',aPost:'',pump:'',eMid:'',eEnd:'',obs:'',coach:'',userNotes:''});
  const [saveStatus, setSaveStatus] = useState(null); // null | 'saving' | 'saved' | 'error'
  const [saveMessage, setSaveMessage] = useState('');
  const [vista, setVista] = useState('hoy');
  const [pestEnt, setPestEnt] = useState('rutina'); // 'rutina' | 'suplementos'
  const [historial, setHistorial] = useState([]);
  const [loadHist, setLoadHist] = useState(false);
  const [loading, setLoading] = useState(true);
  const [prevReg, setPrevReg] = useState(null); // Registro sesi\u00f3n anterior (mismo d\u00eda)
  const [prevFecha, setPrevFecha] = useState('');
  const [streak, setStreak] = useState({weeks:0,totalSessions:0,thisWeek:0});
  const [planData, setPlanData] = useState({}); // sincronizado con TabNutricion planData
  const planSaveRef = useRef(null);
  const [prevIngesta, setPrevIngesta] = useState(null); // {fecha, hora} ultima ingesta reciente previa
  const [nowTick, setNowTick] = useState(Date.now()); // para refrescar contador de ayuno
  const [openEj, setOpenEj] = useState(null); // key del ejercicio expandido (null=todos cerrados)
  const [showTec, setShowTec] = useState({}); // keys de tecnica expandida
  const [warmupDone, setWarmupDone] = useState(false); // warmup completado
  const [warmupTimer, setWarmupTimer] = useState({running:false,endTs:null,left:0});
  const warmupIntRef = useRef(null);
  const saveDebounceRef = useRef(null);
  const saveTimeoutRef = useRef(null);
  // Cron\u00f3metro general de rutina
  const [wkTimer, setWkTimer] = useState({running:false, startTs:null, elapsed:0});
  const wkIntervalRef = useRef(null);

  // Warmup timer helpers
  const startWarmup = (secs) => {
    if(warmupIntRef.current) clearInterval(warmupIntRef.current);
    const end = Date.now() + secs * 1000;
    setWarmupTimer({running:true,endTs:end,left:secs});
    warmupIntRef.current = setInterval(()=>{
      const rem = Math.max(0, Math.ceil((end - Date.now())/1000));
      if(rem <= 0){ clearInterval(warmupIntRef.current); warmupIntRef.current=null; setWarmupTimer({running:false,endTs:null,left:0}); setWarmupDone(true); if(navigator.vibrate) navigator.vibrate([200,100,200]); }
      else setWarmupTimer(p=>({...p,left:rem}));
    }, 250);
  };
  const skipWarmup = () => { if(warmupIntRef.current) clearInterval(warmupIntRef.current); warmupIntRef.current=null; setWarmupTimer({running:false,endTs:null,left:0}); setWarmupDone(true); };

  const prog = cfg.prog[dia] || cfg.prog[1];

  // Tick cada 60s para refrescar contador de ayuno en curso
  useEffect(() => {
    const t = setInterval(() => setNowTick(Date.now()), 60000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    setSaveStatus(null);
    setLoading(true);
    // Cargar sesi\u00f3n actual Y sesi\u00f3n anterior del mismo d\u00eda
    // Cargar streak en paralelo (no bloquea carga principal)
    getStreak(user.id).then(s => setStreak(s)).catch(()=>{});
    // Buscar ultima ingesta mas reciente en los ultimos 3 dias (para mostrar ayuno continuo cross-day)
    (async () => {
      try {
        const { data: rows } = await sb.from('sesiones_entreno')
          .select('fecha,notas')
          .eq('user_id', user.id)
          .lte('fecha', fecha)
          .order('fecha', {ascending:false})
          .limit(5);
        let found = null;
        for(const r of (rows||[])) {
          try {
            const n = JSON.parse(r.notas||'{}');
            if(n.ultimaIngesta && n.ultimaIngesta.length >= 4) {
              // Saltar si es del mismo dia actual y ya hay ultimaIngesta en meta (usar esa directamente)
              if(r.fecha === fecha) { found = {fecha:r.fecha, hora:n.ultimaIngesta}; break; }
              found = {fecha:r.fecha, hora:n.ultimaIngesta};
              break;
            }
          } catch {}
        }
        setPrevIngesta(found);
      } catch(e) { setPrevIngesta(null); }
    })();
    // Cargar planData de nutricion (suplementos sincronizados con TabNutricion)
    getNutricion(user.id, fecha).then(({data:nd}) => {
      try {
        const raw = (nd && nd._notasRaw) ? nd._notasRaw : '{}';
        const n = JSON.parse(raw);
        setPlanData(n.plan || {});
      } catch { setPlanData({}); }
    }).catch(()=>setPlanData({}));
    Promise.all([
      getEntreno(user.id, fecha, dia),
      getPrevSession(user.id, dia, fecha)
    ]).then(([current, prev]) => {
      if(current.data) {
        setReg(current.data.ejercicios || {});
        try { const n = JSON.parse(current.data.notas||'{}'); setMeta(m=>({...m,...n})); } catch {}
      } else {
        setReg({});
        setMeta({inicio:'',fin:'',sueno:'',suenoCalidad:'',despertares:'',horaAcostarse:'',ayuno:'',ultimaIngesta:'',ePre:'',fPre:'',hPre:'',aPre:'',ePost:'',fPost:'',hPost:'',aPost:'',pump:'',eMid:'',eEnd:'',obs:'',coach:''});
      }
      // Sesi\u00f3n anterior para peso sugerido
      if(prev) {
        setPrevReg(prev.ejercicios || null);
        setPrevFecha(prev.fecha || '');
      } else {
        setPrevReg(null);
        setPrevFecha('');
      }
      setLoading(false);
    }).catch(err => {
      console.error('Error loading entreno:', err);
      setLoading(false);
    });
  }, [fecha, dia, user.id]);

  const performSave = useCallback(async (r, m) => {
    setSaveStatus('saving');
    setSaveMessage('Guardando...');

    try {
      const result = await saveEntreno(user.id, fecha, dia, r, JSON.stringify(m));
      if(result.success) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        setSaveStatus('saved');
        setSaveMessage('Guardado ' + timeStr);

        // Clear saved status after 3 seconds
        if(saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => {
          setSaveStatus(null);
          setSaveMessage('');
        }, 3000);
      } else {
        setSaveStatus('error');
        setSaveMessage('Error: ' + result.error);
      }
    } catch(err) {
      setSaveStatus('error');
      setSaveMessage('Error al guardar: ' + err.message);
    }
  }, [user.id, fecha, dia]);

  const debouncedSave = useCallback((r, m) => {
    if(saveDebounceRef.current) clearTimeout(saveDebounceRef.current);

    setSaveStatus('saving');
    setSaveMessage('Guardando en 500ms...');

    saveDebounceRef.current = setTimeout(() => {
      performSave(r, m);
    }, 500);
  }, [performSave]);

  const forceManualSave = useCallback(async () => {
    if(saveDebounceRef.current) clearTimeout(saveDebounceRef.current);
    await performSave(reg, meta);
  }, [reg, meta, performSave]);

  const updSet = (key, si, field, val) => {
    const nr = {...reg, [key]: {...reg[key], [si]: {...(reg[key]?.[si]||{}), [field]:val}}};
    setReg(nr);
    debouncedSave(nr, meta);
  };

  const updEjMeta = (key, field, val) => {
    const nr = {...reg, [key+'_m']: {...(reg[key+'_m']||{}), [field]:val}};
    setReg(nr);

    const vals = [];
    (prog.bloques||[]).forEach((bl,bi) => {
      (bl.ejercicios||[]).forEach((_,ei) => {
        const v = (bi===0&&ei===0&&key==='b0_0'?val:null) || nr['b'+bi+'_'+ei+'_m']?.[field];
        if(v) vals.push(parseInt(v));
      });
    });
    let nm = meta;
    if(vals.length > 0) {
      const avg = String(Math.round(vals.reduce((a,b)=>a+b,0)/vals.length));
      nm = {...meta, [field==='e'?'ePost':'fPost']: avg};
      setMeta(nm);
    }
    debouncedSave(nr, nm);
  };

  const updMeta = (f, v) => {
    const nm = {...meta, [f]:v};
    setMeta(nm);
    debouncedSave(reg, nm);
  };

  // Actualizar planData (suplementos) y sincronizar con nutricion table
  const updatePlanData = useCallback((newPlan) => {
    setPlanData(newPlan);
    if(planSaveRef.current) clearTimeout(planSaveRef.current);
    planSaveRef.current = setTimeout(async () => {
      try {
        // Leer notas actuales, preservar campos no-plan
        const {data:nd} = await getNutricion(user.id, fecha);
        let existingNotas = {};
        try { existingNotas = JSON.parse((nd && nd._notasRaw) || '{}'); } catch {}
        existingNotas.plan = newPlan;
        await sb.from('nutricion').upsert({ user_id:user.id, fecha, notas: JSON.stringify(existingNotas) }, { onConflict:'user_id,fecha' });
      } catch(e) { console.error('Plan save error (entreno):', e); }
    }, 600);
  }, [user.id, fecha]);

  const duracion = () => {
    if(!meta.inicio||!meta.fin) return null;
    const [h1,m1] = meta.inicio.split(':').map(Number);
    const [h2,m2] = meta.fin.split(':').map(Number);
    let d = (h2*60+m2)-(h1*60+m1);
    if(d<0) d+=1440;
    return (d/60).toFixed(1);
  };

  // ── CRON\u00d3METRO GENERAL DE RUTINA ─────────────────────────────────────────
  const wkStart = () => {
    const now = Date.now();
    const horaStr = new Date(now).toTimeString().slice(0,5);
    updMeta('inicio', horaStr);
    setWkTimer({running:true, startTs:now, elapsed:0});
    if(wkIntervalRef.current) clearInterval(wkIntervalRef.current);
    wkIntervalRef.current = setInterval(() => {
      setWkTimer(prev => prev.running ? {...prev, elapsed: Math.floor((Date.now()-prev.startTs)/1000)} : prev);
    }, 1000);
  };
  const wkStop = () => {
    if(wkIntervalRef.current) clearInterval(wkIntervalRef.current);
    wkIntervalRef.current = null;
    const now = Date.now();
    const horaStr = new Date(now).toTimeString().slice(0,5);
    const elapsedSec = wkTimer.startTs ? Math.floor((now - wkTimer.startTs)/1000) : wkTimer.elapsed;
    const durMin = Math.round(elapsedSec/60);
    setWkTimer(prev => ({...prev, running:false, elapsed:elapsedSec}));
    // Auto-llenar hora fin y duraci\u00f3n en minutos
    const nm = {...meta, fin:horaStr, durMin:String(durMin)};
    setMeta(nm);
    debouncedSave(reg, nm);
  };
  const wkReset = () => {
    if(wkIntervalRef.current) clearInterval(wkIntervalRef.current);
    wkIntervalRef.current = null;
    setWkTimer({running:false, startTs:null, elapsed:0});
  };
  useEffect(() => {
    const onVisWk = () => {
      if(document.visibilityState==='visible') {
        setWkTimer(prev => prev.running && prev.startTs ? {...prev, elapsed: Math.floor((Date.now()-prev.startTs)/1000)} : prev);
      }
    };
    document.addEventListener('visibilitychange', onVisWk);
    return () => { if(wkIntervalRef.current) clearInterval(wkIntervalRef.current); document.removeEventListener('visibilitychange', onVisWk); };
  }, []);
  const fmtElapsed = (s) => {
    const h = Math.floor(s/3600);
    const m = Math.floor((s%3600)/60);
    const sec = s%60;
    return (h>0?h+':':'') + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  };

  const verHistorial = async () => {
    setLoadHist(true);
    const { data } = await getHistorialEntreno(user.id);
    setHistorial(data || []);
    setLoadHist(false);
    setVista('historial');
  };

  const cargarSesion = async (f, d) => {
    setFecha(f); setDia(d); setVista('hoy');
  };

  const imprimir = () => {
    const bloqueHtml = (prog.bloques||[]).map(bl => {
      const esBi = bl.ejercicios.length > 1;
      return `<div style="margin-bottom:12px">
        <div style="background:#333;color:#fff;padding:5px 10px;font-size:15px;font-weight:bold">${bl.nombre}${esBi?' (BISERIE)':''}</div>
        ${bl.ejercicios.map((ej,ei) => {
          const key = 'b'+prog.bloques.indexOf(bl)+'_'+ei;
          const rc = getRirColor(ej.rir);
          let rows = '';
          for(let s=0;s<ej.sets;s++){
            const sr = reg[key]?.[s]||{};
            rows += `<tr><td>${s+1}</td><td>${sr.peso||''}</td><td>${sr.reps||''}</td><td>${sr.rir||''}</td><td>${sr.rpe||''}</td><td>${sr.notas||''}</td></tr>`;
          }
          return `<div style="margin:4px 0;border-left:3px solid ${rc};padding-left:8px">
            <div style="font-weight:bold;font-size:13px">${ej.nombre} <span style="color:#888;font-size:11px">(${ej.musculo})</span> — ${ej.sets}x${ej.reps} RIR ${ej.rir}</div>
            ${ej.tecnica?`<div style="font-size:10px;color:#666;font-style:italic;margin:2px 0">${ej.tecnica}</div>`:''}
            <table border="1" style="width:100%;border-collapse:collapse;margin-top:4px;font-size:11px">
              <tr style="background:#f0f0f0"><th>Set</th><th>Peso kg</th><th>Reps</th><th>RIR</th><th>RPE</th><th>Notas</th></tr>
              ${rows}
            </table></div>`;
        }).join('')}
      </div>`;
    }).join('');

    const w = window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${prog.nombre} - ${fmtFecha(fecha)}</title>
    <style>body{font-family:sans-serif;padding:20px;color:#111;font-size:13px}h1{font-size:18px}@media print{button{display:none}}</style></head>
    <body><button onclick="window.print()" style="margin-bottom:16px;padding:8px 20px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer">Imprimir</button>
    <h1>${prog.nombre} — ${fmtFecha(fecha)}</h1>
    <p style="color:#888;font-size:12px;margin-bottom:12px">Tipo: ${(prog.tipo||'').toUpperCase()} | Carbos: ${prog.carbos} | Inicio: ${meta.inicio||'--'} | Fin: ${meta.fin||'--'} | ${duracion()?duracion()+'h':''}</p>
    ${bloqueHtml}
    ${meta.obs?`<div style="margin-top:12px"><b>Observaciones:</b><p>${meta.obs}</p></div>`:''}
    ${(meta.userNotes||meta.coach)?`<div style="margin-top:8px"><b>Mis notas:</b><p style="color:#7c3aed">${meta.userNotes||meta.coach}</p></div>`:''}
    </body></html>`);
    w.document.close();
  };

  if(vista === 'historial') return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700}}>Historial de sesiones</div>
        <button onClick={()=>setVista('hoy')} style={{background:G.alt,color:G.dim,border:'1px solid '+G.bor,borderRadius:7,padding:'5px 12px',fontSize:15}}>Volver</button>
      </div>
      {loadHist ? <div style={{color:G.mu,textAlign:'center',padding:20}}>Cargando...</div> :
       historial.length === 0 ? <div style={{color:G.mu,padding:20,textAlign:'center'}}>Sin sesiones guardadas</div> :
       historial.map((s,i) => {
         const p = PROG[s.dia_semana];
         let notas = {};
         try { notas = JSON.parse(s.notas||'{}'); } catch {}
         return (
           <div key={i} onClick={()=>cargarSesion(s.fecha,s.dia_semana)} style={{background:G.sur,border:'1px solid '+G.bor,borderRadius:10,padding:12,marginBottom:8,cursor:'pointer'}}>
             <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
               <div>
                 <div style={{fontWeight:600,fontSize:15}}>{p?.nombre || 'Dia '+s.dia_semana}</div>
                 <div style={{fontSize:15,color:G.mu}}>{fmtFecha(s.fecha)}</div>
               </div>
               <div style={{textAlign:'right',fontSize:15,color:G.dim}}>
                 {notas.ePost && <span>E:{notas.ePost}/10 </span>}
                 {notas.pump && <span>P:{notas.pump}/10</span>}
               </div>
             </div>
           </div>
         );
       })
      }
    </div>
  );

  const dur = duracion();

  if(loading) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:40,color:G.mu}}>
        <span style={{animation:'spin 1s linear infinite'}}>{'\u{27F3}'}</span> Cargando sesion...
      </div>
    );
  }

  return (
    <div>
      <Sec>
        <NavSemana fecha={fecha} setFecha={setFecha} dia={dia} setDia={setDia} />
        {(() => { const sem = PERIODO[getSemPeriodo(fecha)]; return (
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:10}}>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontWeight:700,fontSize:15}}>{prog.nombre} <span style={{fontSize:15,color:G.mu,fontWeight:400}}>{fmtFecha(fecha)}</span></div>
            <div style={{display:'flex',gap:6,alignItems:'center',marginTop:3,flexWrap:'wrap'}}>
              <span style={{background:(TC[prog.tipo]||G.mu)+'22',color:TC[prog.tipo]||G.mu,borderRadius:4,padding:'2px 8px',fontSize:15,fontFamily:'monospace',fontWeight:700,letterSpacing:1}}>{(prog.tipo||'').toUpperCase()}</span>
              <span style={{background:sem.color+'22',color:sem.color,borderRadius:4,padding:'2px 8px',fontSize:15,fontFamily:'monospace',fontWeight:700}}>{sem.emoji} S{getSemPeriodo(fecha)}: {sem.nombre}</span>
              <span style={{fontSize:15,color:G.warn,fontFamily:'monospace'}}>{prog.carbos}</span>
            </div>
            {prog.cardio && <div style={{fontSize:15,color:'#38bdf8',marginTop:4}}>{'\u{1F6B6}'} {prog.cardio}</div>}
            {prog.cf_opcional && <div style={{fontSize:15,color:G.warn,marginTop:2}}>{'\u{1F3CB}'} {'CrossFit opcional (seg\u00FAn fatiga)'}</div>}
          </div>
        </div>

    ),

    !q && React.createElement('div', {style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}},

        React.createElement('button', {key:c.id, onClick:()=>setCat(cat===c.id?null:c.id), style:{padding:'4px 10px',borderRadius:6,border:cat===c.id?'1px solid '+c.c:'1px solid '+G.bor,background:cat===c.id?c.c+'22':'transparent',color:cat===c.id?c.c:G.mu,fontSize:15,fontWeight:600,cursor:'pointer'}}, c.n)

  );
}

function PlanDelDia({fecha, dia, planData, onUpdate, cfg, userId, onBreakFast}) {
  const tipo = cfg.getDayType(dia);
  const plan = cfg.planes[tipo];
  if(!plan) return null;

  const checkedSupAM = planData.sup_am || [];
  const checkedSupPOST = planData.sup_post || [];
  const checkedSupPM = planData.sup_pm || [];
  const checkedMeals = planData.meals_checked || [];
  const realData = planData.real || {};
  const supReal = planData.sup_real || {};

  const toggleMeal = (mealId) => {
    const cur = planData.meals_checked || [];
    const next = cur.includes(mealId) ? cur.filter(x=>x!==mealId) : [...cur, mealId];
    onUpdate({...planData, meals_checked:next});
  };

  const updateReal = (mealId, items) => {
    const nr = {...(planData.real||{}), [mealId]:items};
    if(Object.keys(items).length===0) delete nr[mealId];
    onUpdate({...planData, real:nr});
  };

  const updateSupReal = (key, items) => {
    const nr = {...(planData.sup_real||{}), [key]:items};
    onUpdate({...planData, sup_real:nr});
  };

  // Progress calc
  const SUPLE_MEAL_IDS = ['pre','intra','post'];
  const totalSups = (cfg.suplementos.AM||[]).length + (cfg.suplementos.POST||[]).length + (cfg.suplementos.PM||[]).length;
  const doneSups = checkedSupAM.length + checkedSupPOST.length + checkedSupPM.length;
  const totalMeals = plan.comidas.filter(c=>c.id!=='ayuno' && !SUPLE_MEAL_IDS.includes(c.id)).length;
  const doneMeals = checkedMeals.filter(id => plan.comidas.some(c=>c.id===id&&c.id!=='ayuno' && !SUPLE_MEAL_IDS.includes(c.id))).length;
  const totalItems = totalSups + totalMeals;
  const doneItems = doneSups + doneMeals;
  const pctDone = totalItems > 0 ? Math.round(doneItems/totalItems*100) : 0;

  // ─── CALCULAR MACROS REALES TOTALES (de todos los trackers) ───
  const calcTotalReal = () => {
    let p=0, c=0, g=0;
    // Macros de comidas con tracker real
    Object.values(realData).forEach(mealItems => {
      Object.entries(mealItems).forEach(([alId,qty]) => {
        if(qty>0){ const m=calcAlMacros(alId,qty); p+=m.p; c+=m.c; g+=m.g; }
      });
    });
    // Macros de suplementos con tracker real
    Object.values(supReal).forEach(supItems => {
      Object.entries(supItems).forEach(([alId,qty]) => {
        if(qty>0){ const m=calcAlMacros(alId,qty); p+=m.p; c+=m.c; g+=m.g; }
      });
    });
    return {p:Math.round(p), c:Math.round(c), g:Math.round(g), k:Math.round(p*4+c*4+g*9)};
  };

  // Check if there's any real data entered
  const hasAnyReal = Object.values(realData).some(m=>Object.keys(m).length>0) || Object.values(supReal).some(m=>Object.keys(m).length>0);

  return React.createElement('div', null,
    // Header con progreso
    React.createElement(Sec, {color:plan.color},
      React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
        React.createElement('div', null,
          React.createElement('div', {style:{fontSize:15,fontWeight:700,color:plan.color}}, '\u{1F4CB} ' + plan.label),
          React.createElement('div', {style:{fontSize:15,color:G.mu,marginTop:2}}, 'Meta: ~' + plan.resumen.prot + 'g prot | ~' + plan.resumen.carbs + 'g carbs | ~' + plan.resumen.kcal + ' kcal')
        ),
        React.createElement('div', {style:{textAlign:'right'}},
          React.createElement('div', {style:{fontSize:22,fontWeight:700,fontFamily:'monospace',color:pctDone>=80?G.ok:pctDone>=50?G.warn:G.dim}}, pctDone + '%'),
          React.createElement('div', {style:{fontSize:15,color:G.mu}}, doneItems + '/' + totalItems + ' items')
        )
      ),
      React.createElement('div', {style:{height:6,background:G.alt,borderRadius:3,overflow:'hidden'}},
        React.createElement('div', {style:{height:'100%',width:pctDone+'%',background:pctDone>=80?G.ok:pctDone>=50?G.warn:G.acc,borderRadius:3,transition:'width 0.3s'}})
      ),
      plan.resumen.nota && React.createElement('div', {style:{fontSize:15,color:G.mu,marginTop:8,fontStyle:'italic'}}, '\u{1F4A1} ' + plan.resumen.nota)
    ),

    // ─── SUPLEMENTOS AM con tracker real ───
    (tipo!=='crossfit' && tipo!=='descanso') && React.createElement(SupChecklist, {
      timing:'AM', label:'SUPLEMENTOS AM \u{2600}\u{FE0F}', color:G.acc,
      checked:checkedSupAM,
      onChange:(v)=>onUpdate({...planData, sup_am:v}),
      suplementos:cfg.suplementos,
      realItems:supReal['am']||{},
      onRealUpdate:(items)=>updateSupReal('am', items),
      userId:userId, dayType:tipo, onBreakFast:onBreakFast
    }),

    // ─── COMIDAS DEL DIA con tracker real ───
    React.createElement('div', {style:{marginBottom:12}},
      React.createElement('div', {style:{fontSize:15,fontFamily:'monospace',letterSpacing:2,color:G.warn,fontWeight:700,marginBottom:10,paddingLeft:4}}, 'COMIDAS DEL D\u00CDA \u{1F372}'),
      plan.comidas.filter(c => !['pre','intra','post'].includes(c.id)).map(comida =>
        React.createElement(PlanMealBlock, {
          key:comida.id,
          comida:comida,
          isChecked:checkedMeals.includes(comida.id),
          onCheck:()=>toggleMeal(comida.id),
          realItems:realData[comida.id]||{},
          onRealUpdate:(mealId, items)=>updateReal(mealId, items),
          userId:userId,
          dayType:tipo
        })
      )
    ),

    // ─── SUPLEMENTOS POST con tracker real ───
    (tipo!=='descanso') && React.createElement(SupChecklist, {
      timing:'POST', label:'SUPLEMENTOS POST \u{1F4AA}', color:G.ok,
      checked:checkedSupPOST,
      onChange:(v)=>onUpdate({...planData, sup_post:v}),
      suplementos:cfg.suplementos,
      realItems:supReal['post']||{},
      onRealUpdate:(items)=>updateSupReal('post', items),
      userId:userId, dayType:tipo, onBreakFast:onBreakFast
    }),

    // CrossFit: suplementos AM reubicados
    (tipo==='crossfit') && React.createElement(SupChecklist, {
      timing:'AM', label:'SUPLEMENTOS PRE-WOD \u{26A1}', color:G.warn,
      checked:checkedSupAM,
      onChange:(v)=>onUpdate({...planData, sup_am:v}),
      suplementos:cfg.suplementos,
      realItems:supReal['am']||{},
      onRealUpdate:(items)=>updateSupReal('am', items),
      userId:userId, dayType:tipo, onBreakFast:onBreakFast
    }),

    // ─── SUPLEMENTOS PM con tracker real ───
    React.createElement(SupChecklist, {
      timing:'PM', label:'SUPLEMENTOS PM \u{1F31C}', color:G.coa,
      checked:checkedSupPM,
      onChange:(v)=>onUpdate({...planData, sup_pm:v}),
      suplementos:cfg.suplementos,
      realItems:supReal['pm']||{},
      onRealUpdate:(items)=>updateSupReal('pm', items),
      userId:userId, dayType:tipo, onBreakFast:onBreakFast
    }),

    // ─── RESUMEN CONSUMIDO HOY ───
    (() => {
      const METAS = cfg.metas;
      // Si hay datos reales del tracker, usar esos
      if(hasAnyReal) {
        const tot = calcTotalReal();
        return React.createElement(Sec, {color:G.ok},
          React.createElement('div', {style:{fontSize:15,fontFamily:'monospace',letterSpacing:2,color:G.ok,fontWeight:700,marginBottom:10}}, '\u{2705} CONSUMIDO HOY (TRACKER REAL)'),
          React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,textAlign:'center'}},
            [{l:'Prote\u00EDna',v:tot.p,m:METAS.prot,u:'g',c:G.acc},{l:'Carbos',v:tot.c,m:METAS.carbs,u:'g',c:G.warn},{l:'Grasa',v:tot.g,m:METAS.grasa,u:'g',c:G.coa},{l:'Kcal',v:tot.k,m:METAS.kcal,u:'',c:G.dim}].map(x =>
              React.createElement('div', {key:x.l,style:{background:G.alt,borderRadius:8,padding:'8px 4px'}},
                React.createElement('div', {style:{fontSize:18,fontWeight:700,fontFamily:'monospace',color:x.v>=x.m*0.9?G.ok:x.c}}, x.v),
                React.createElement('div', {style:{fontSize:15,color:G.mu,marginTop:2}}, x.l),
                React.createElement('div', {style:{fontSize:15,color:G.mu}}, '/' + x.m + x.u)
              )
            )
          ),
          // Barras de progreso
          React.createElement('div', {style:{marginTop:10}},
            [{l:'P',v:tot.p,m:METAS.prot,c:G.acc},{l:'C',v:tot.c,m:METAS.carbs,c:G.warn},{l:'G',v:tot.g,m:METAS.grasa,c:G.coa}].map(x => {
              const pct = Math.min(120, Math.round(x.v/x.m*100));
              return React.createElement('div', {key:x.l, style:{marginBottom:4}},
                React.createElement('div', {style:{display:'flex',justifyContent:'space-between',fontSize:15,color:G.mu,marginBottom:2}},
                  React.createElement('span', null, x.l),
                  React.createElement('span', null, x.v+'/'+x.m+'g ('+pct+'%)')
                ),
                React.createElement('div', {style:{height:5,background:G.alt,borderRadius:3,overflow:'hidden'}},
                  React.createElement('div', {style:{height:'100%',width:Math.min(100,pct)+'%',background:pct>100?G.bad:pct>=80?G.ok:x.c,borderRadius:3}})
                )
              );
            })
          ),
          // Deficit/surplus indicator
          React.createElement('div', {style:{marginTop:10,padding:'8px 12px',background:tot.k>METAS.kcal?G.bad+'15':tot.k>=METAS.kcal*0.85?G.ok+'15':G.warn+'15',borderRadius:8,textAlign:'center'}},
            React.createElement('span', {style:{fontSize:15,fontWeight:700,fontFamily:'monospace',color:tot.k>METAS.kcal?G.bad:tot.k>=METAS.kcal*0.85?G.ok:G.warn}},
              tot.k > METAS.kcal ? '\u{26A0}\u{FE0F} SUPER\u00C1VIT +' + (tot.k-METAS.kcal) + ' kcal' :
              tot.k >= METAS.kcal*0.85 ? '\u{2705} EN RANGO (' + (METAS.kcal-tot.k) + ' kcal restantes)' :
              '\u{1F4C9} D\u00C9FICIT \u2212' + (METAS.kcal-tot.k) + ' kcal'
            )
          )
        );
      }
      // Fallback: macros desde checkmarks del plan
      if(doneItems===0) return null;
      const pM = (txt) => { if(!txt) return {p:0,c:0,g:0}; const pm=txt.match(/P:~?(\d+)/i); const cm=txt.match(/C:~?(\d+)/i); const gm=txt.match(/G:~?(\d+)/i); return {p:pm?parseInt(pm[1]):0,c:cm?parseInt(cm[1]):0,g:gm?parseInt(gm[1]):0}; };
      const checked = plan.comidas.filter(c => checkedMeals.includes(c.id) && c.id!=='ayuno' && !['pre','intra','post'].includes(c.id));
      const overridden = checked.map(c => pM(c.macros));
      const preMeal = plan.comidas.find(c => c.id==='pre');
      const postMeal = plan.comidas.find(c => c.id==='post');
      if(preMeal && checkedSupAM.length > 0) overridden.push(pM(preMeal.macros));
      if(postMeal && checkedSupPOST.length > 0) overridden.push(pM(postMeal.macros));
      const tot = overridden.reduce((a,m) => ({p:a.p+m.p,c:a.c+m.c,g:a.g+m.g}), {p:0,c:0,g:0});
      tot.k = tot.p*4+tot.c*4+tot.g*9;
      return React.createElement(Sec, {color:G.ok},
        React.createElement('div', {style:{fontSize:15,fontFamily:'monospace',letterSpacing:2,color:G.ok,fontWeight:700,marginBottom:6}}, '\u{2705} CONSUMIDO HOY (ESTIMADO)'),
        React.createElement('div', {style:{fontSize:15,color:G.mu,marginBottom:8,fontStyle:'italic'}}, 'Basado en checklist. Usa "Registrar real" para datos exactos.'),
        React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,textAlign:'center'}},
          [{l:'Prot',v:tot.p,m:METAS.prot,u:'g',c:G.acc},{l:'Carbs',v:tot.c,m:METAS.carbs,u:'g',c:G.warn},{l:'Grasa',v:tot.g,m:METAS.grasa,u:'g',c:G.coa},{l:'Kcal',v:tot.k,m:METAS.kcal,u:'',c:G.dim}].map(x =>
            React.createElement('div', {key:x.l,style:{background:G.alt,borderRadius:8,padding:'8px 4px'}},
              React.createElement('div', {style:{fontSize:18,fontWeight:700,fontFamily:'monospace',color:x.v>=x.m*0.9?G.ok:x.c}}, x.v),
              React.createElement('div', {style:{fontSize:15,color:G.mu,marginTop:2}}, x.l),
              React.createElement('div', {style:{fontSize:15,color:G.mu}}, '/' + x.m + x.u)
            )
          )
        )
      );
    })()
  );
}

// ─── TAB NUTRICION ────────────────────────────────────────────────────────────
function TabNutricion({user, cfg}) {
  const [fecha, setFecha] = useState(hoy());
  const [dia, setDia] = useState(diaHoy());
  const [data, setData] = useState({});
  const [vista, setVista] = useState('plan');
  const [planData, setPlanData] = useState({});
  const [saveStatus, setSaveStatus] = useState(null);
  const [saveMessage, setSaveMessage] = useState('');
  const saveDebounceRef = useRef(null);
  const saveTimeoutRef = useRef(null);
  const planSaveRef = useRef(null);
  const prog = cfg.prog[dia] || cfg.prog[1];

  useEffect(() => {
    setSaveStatus(null);
    setDia(new Date(fecha+'T12:00').getDay());
    getNutricion(user.id, fecha).then(({data:d}) => {
      setData(d || {});
      // Load plan data from raw notas JSON
      try {
        const raw = (d && d._notasRaw) ? d._notasRaw : '{}';
        const n = JSON.parse(raw);
        setPlanData(n.plan || {});
      } catch { setPlanData({}); }
    });
  }, [fecha, user.id]);

  const performSave = useCallback(async (nd) => {
    setSaveStatus('saving');
    setSaveMessage('Guardando...');

    try {
      const result = await saveNutricion(user.id, fecha, nd);
      if(result.success) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        setSaveStatus('saved');
        setSaveMessage('Guardado ' + timeStr);

        if(saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => {
          setSaveStatus(null);
          setSaveMessage('');
        }, 3000);
      } else {
        setSaveStatus('error');
        setSaveMessage('Error: ' + result.error);
      }
    } catch(err) {
      setSaveStatus('error');
      setSaveMessage('Error al guardar: ' + err.message);
    }
  }, [user.id, fecha]);

  const upd = (f, v) => {
    const nd = {...data, [f]:v};
    setData(nd);
    if(saveDebounceRef.current) clearTimeout(saveDebounceRef.current);

    setSaveStatus('saving');
    setSaveMessage('Guardando en 500ms...');

    saveDebounceRef.current = setTimeout(() => {
      performSave(nd);
    }, 500);
  };

  const forceManualSave = useCallback(async () => {
    if(saveDebounceRef.current) clearTimeout(saveDebounceRef.current);
    await performSave(data);
  }, [data, performSave]);

  const updatePlanData = useCallback((newPlan) => {
    setPlanData(newPlan);
    setSaveStatus('saving');
    setSaveMessage('Guardando...');
    // Save plan data merged into notas field
    if(planSaveRef.current) clearTimeout(planSaveRef.current);
    planSaveRef.current = setTimeout(async () => {
      try {
        const existingNotas = {};
        try { Object.assign(existingNotas, JSON.parse(data._notasRaw || '{}')); } catch {}
        existingNotas.plan = newPlan;
        // Preserve hambre/digestion at top level
        if(data.hambre) existingNotas.hambre = data.hambre;
        if(data.digestion) existingNotas.digestion = data.digestion;
        // Only upsert notas field to avoid issues with empty/null fields
        const result = await sb.from('nutricion').upsert({ user_id:user.id, fecha, notas: JSON.stringify(existingNotas) }, { onConflict:'user_id,fecha' });
        if(result.error) throw result.error;
        // Update _notasRaw so future saves preserve plan
        setData(prev => ({...prev, _notasRaw: JSON.stringify(existingNotas)}));
        const timeStr = new Date().toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        setSaveStatus('saved');
        setSaveMessage('Guardado ' + timeStr);
        if(saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => { setSaveStatus(null); setSaveMessage(''); }, 3000);
      } catch(e) {
        console.error('Plan save error:', e);
        setSaveStatus('error');
        setSaveMessage('Error al guardar plan');
      }
    }, 600);
  }, [data, user.id, fecha]);

  const calcAyuno = () => {
    if(!data.ayuno_ini || !data.ayuno_fin) return null;
    const [h1,m1] = data.ayuno_ini.split(':').map(Number);
    const [h2,m2] = data.ayuno_fin.split(':').map(Number);
    let d = (h2*60+m2)-(h1*60+m1);
    if(d<0) d+=1440;
    return (d/60).toFixed(1);
  };
  const hrs = calcAyuno();

  // Metas diarias
  const METAS = cfg.metas;

  // Parsear macros de cada comida: "texto | P:20g C:0 G:5g"
  const parseMacros = (txt) => {
    if(!txt) return { p:0, c:0, g:0 };
    const pm = txt.match(/P:~?(\d+)/i); const cm = txt.match(/C:~?(\d+)/i); const gm = txt.match(/G:~?(\d+)/i);
    return { p: pm?parseInt(pm[1]):0, c: cm?parseInt(cm[1]):0, g: gm?parseInt(gm[1]):0 };
  };

  // Calcular totales de todas las comidas
  const campos = [
    ['Pre-entreno','pre','EAA, colageno... | P:20g C:0 G:0'],
    ['Intra-entreno','intra','Agua + sal... | P:0 C:0 G:0'],
    ['Post inmediato','postInm','Proteina... | P:40g C:2g G:1g'],
    ['Post 30-60 min','post60','Comida... | P:30g C:3g G:25g'],
    ['Comida 2','c1','Desc... | P:20g C:5g G:8g'],
    ['Comida 3','c2','Desc... | P:25g C:7g G:33g'],
    ['Cena','cena','Desc... | P:50g C:2g G:20g'],
    ['Suplementos','suple','Creatina, vitaminas...']
  ];

  const totales = campos.reduce((acc, [,field]) => {
    const m = parseMacros(data[field]||'');
    return { p: acc.p+m.p, c: acc.c+m.c, g: acc.g+m.g };
  }, { p:0, c:0, g:0 });
  // Sumar macros reales de suplementos + comidas del Plan del D\u00EDa
  if(planData) {
    const srcs = [planData.sup_real||{}, planData.real||{}];
    srcs.forEach(src => {
      Object.values(src).forEach(items => {
        Object.entries(items||{}).forEach(([alId,qty]) => {
          if(qty>0){ const m=calcAlMacros(alId,qty); totales.p+=Math.round(m.p); totales.c+=Math.round(m.c); totales.g+=Math.round(m.g); }
        });
      });
    });
  }
  totales.kcal = totales.p*4 + totales.c*4 + totales.g*9;

  const pctP = Math.min(100, Math.round(totales.p/METAS.prot*100));
  const pctC = Math.min(100, Math.round(totales.c/METAS.carbs*100));
  const pctG = Math.min(100, Math.round(totales.g/METAS.grasa*100));
  const pctK = Math.min(100, Math.round(totales.kcal/METAS.kcal*100));
  const aguaPct = Math.min(100, Math.round(parseFloat(data.agua||0)/METAS.agua*100));

  const BarMacro = ({label, current, target, pct, color, unit}) => (
    <div style={{marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:15,marginBottom:3}}>
        <span style={{color:G.dim}}>{label}</span>
        <span style={{fontFamily:'monospace',color:pct>=100?G.ok:color}}>
          <b>{current}</b>/{target}{unit} <span style={{fontSize:15,color:G.mu}}>({pct}%)</span>
        </span>
      </div>
      <div style={{height:6,background:G.alt,borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',width:pct+'%',background:pct>=90?G.ok:pct>=60?color:G.bad,borderRadius:3,transition:'width 0.3s'}}/>
      </div>
      {target-current>0 && <div style={{fontSize:15,color:G.mu,marginTop:2,textAlign:'right'}}>Faltan {target-current}{unit}</div>}
    </div>
  );

  return (
    <div>
      <Sec>
        <NavSemana fecha={fecha} setFecha={setFecha} dia={dia} setDia={setDia} />
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:10}}>
          <span style={{fontSize:15,fontWeight:700}}>{prog.nombre} <span style={{fontSize:15,color:G.mu,fontWeight:400}}>{fmtFecha(fecha)}</span></span>
          <span style={{marginLeft:'auto',fontSize:15,color:G.warn}}>Carbos: {prog.carbos}</span>
        </div>
        {/* TOGGLE PLAN / REGISTRO */}
        <div style={{display:'flex',gap:0,marginBottom:10,background:G.alt,borderRadius:10,padding:3,border:'1px solid '+G.bor}}>
          {[['plan','PLAN','\u{1F4CB}'],['actual','REGISTRO','\u{1F4DD}'],['recetas','RECETARIO','\u{1F373}']].map(([v,l,ic]) => (
            <button key={v} onClick={()=>setVista(v)} style={{flex:1,background:vista===v?G.acc:'transparent',color:vista===v?'#fff':G.dim,border:'none',borderRadius:8,padding:'8px 10px',fontSize:15,fontWeight:700,fontFamily:'monospace',letterSpacing:0.5,cursor:'pointer',transition:'all 0.2s'}}>
              {ic} {l}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {vista==='actual' && <button onClick={forceManualSave} style={{background:G.acc,color:'#fff',border:'none',borderRadius:7,padding:'6px 14px',fontSize:15,fontWeight:600}}>GUARDAR AHORA</button>}
          {vista==='plan' && saveStatus==='saved' && <span style={{fontSize:15,color:G.ok,display:'flex',alignItems:'center',gap:4}}>{'\u2705'} Registro guardado</span>}
        </div>
        <SaveStatus status={saveStatus} message={saveMessage} onRetry={forceManualSave} />
      </Sec>

      <CoachDelDia user={user} cfg={cfg} fecha={fecha} dia={dia} meta={{}} reg={{}} />

      {/* ─── VISTA: PLAN DEL DIA ─── */}
      {vista==='plan' && (
        <PlanDelDia fecha={fecha} dia={dia} planData={planData} onUpdate={updatePlanData} cfg={cfg} userId={user.id}
          onBreakFast={(hora, sup) => { if(!data.ayuno_fin) upd('ayuno_fin', hora); }} />
      )}

      {/* ─── VISTA: REGISTRO ACTUAL ─── */}
      {vista==='actual' && <>
      <Sec title="MACROS DEL DIA" color={G.acc}>
        <div style={{padding:'10px 12px',background:G.alt,borderRadius:10,marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:18,fontWeight:700,fontFamily:'monospace',color:pctK>=90?G.ok:G.acc}}>{totales.kcal}</span>
            <span style={{fontSize:15,color:G.mu}}>/ {METAS.kcal} kcal ({pctK}%)</span>
          </div>
          <BarMacro label="Proteina" current={totales.p} target={METAS.prot} pct={pctP} color={G.acc} unit="g" />
          <BarMacro label="Carbos netos" current={totales.c} target={METAS.carbs} pct={pctC} color={G.warn} unit="g" />
          <BarMacro label="Grasa" current={totales.g} target={METAS.grasa} pct={pctG} color={G.coa} unit="g" />
          <BarMacro label="Agua" current={parseFloat(data.agua||0)} target={METAS.agua} pct={aguaPct} color='#38bdf8' unit="L" />
        </div>
        {(() => {
          const alertas = [];
          const carbMax = parseInt(prog.carbos) || 40;
          if(totales.c > carbMax) alertas.push({tipo:'bad',msg:'\u26A0\uFE0F CARBOS EXCEDIDOS: '+totales.c+'g / max '+carbMax+'g \u2014 cuidar cetosis',icon:'\u{1F6AB}'});
          else if(totales.c > carbMax*0.85) alertas.push({tipo:'warn',msg:'\u26A1 Carbos al limite: '+totales.c+'g de '+carbMax+'g \u2014 vigilar proximas comidas',icon:'\u26A1'});
          if(totales.g > METAS.grasa*1.1) alertas.push({tipo:'warn',msg:'\u26A0\uFE0F GRASA alta: '+totales.g+'g / meta '+METAS.grasa+'g \u2014 moderar grasas restantes',icon:'\u{1F9C8}'});
          if(pctP < 50 && new Date().getHours() >= 16) alertas.push({tipo:'bad',msg:'\u{1F969} PROTEINA baja ('+totales.p+'g/'+METAS.prot+'g) \u2014 priorizar prote en comidas restantes',icon:'\u{1F969}'});
          else if(pctP < 70 && new Date().getHours() >= 20) alertas.push({tipo:'bad',msg:'\u{1F969} DEFICIT PROTEINA critico: '+totales.p+'g de '+METAS.prot+'g \u2014 falta '+(METAS.prot-totales.p)+'g antes de dormir',icon:'\u{1F969}'});
          if(parseFloat(data.agua||0) < 2 && new Date().getHours() >= 14) alertas.push({tipo:'warn',msg:'\u{1F4A7} AGUA baja: '+(data.agua||0)+'L \u2014 objetivo '+METAS.agua+'L, tomar mas',icon:'\u{1F4A7}'});
          if(totales.kcal > METAS.kcal*1.1) alertas.push({tipo:'warn',msg:'\u{1F525} CALORIAS excedidas: '+totales.kcal+' / '+METAS.kcal+' kcal',icon:'\u{1F525}'});
          if(totales.kcal < METAS.kcal*0.6 && new Date().getHours() >= 18) alertas.push({tipo:'warn',msg:'\u26A1 DEFICIT calorico alto: '+totales.kcal+'/'+METAS.kcal+' kcal \u2014 asegurar cena completa',icon:'\u26A1'});
          if(alertas.length === 0 && pctP >= 80 && pctK >= 70) alertas.push({tipo:'ok',msg:'\u2705 Macros en rango \u2014 vas bien, sigue asi',icon:'\u2705'});
          return alertas.length > 0 && (
            <div style={{marginTop:10}}>
              {alertas.map((a,i) => (
                <div key={i} style={{background:a.tipo==='bad'?'#ef444418':a.tipo==='warn'?'#f59e0b18':'#22c55e18',border:'1px solid '+(a.tipo==='bad'?'#ef444444':a.tipo==='warn'?'#f59e0b44':'#22c55e44'),borderRadius:8,padding:'8px 12px',marginBottom:6,fontSize:15,color:a.tipo==='bad'?'#c53030':a.tipo==='warn'?'#b45309':'#15803d',display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{fontSize:15,flexShrink:0}}>{a.icon}</span>
                  <span>{a.msg}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </Sec>

      <Sec title="AYUNO" color={G.ok}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:8}}>
          <div>
            <div style={{fontSize:15,color:G.mu,marginBottom:3}}>Ultima comida</div>
            <Inp type="time" value={data.ayuno_ini||''} onChange={e=>upd('ayuno_ini',e.target.value)} />
          </div>
          <div>
            <div style={{fontSize:15,color:G.mu,marginBottom:3}}>Primera comida</div>
            <Inp type="time" value={data.ayuno_fin||''} onChange={e=>upd('ayuno_fin',e.target.value)} />
          </div>
        </div>
        {hrs && (
          <div style={{padding:'8px 12px',background:G.alt,borderRadius:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:15,color:G.mu}}>Duracion ayuno</span>
            <span style={{fontSize:22,fontWeight:700,fontFamily:'monospace',color:parseFloat(hrs)>=12?G.ok:G.warn}}>{hrs}h</span>
          </div>
        )}
      </Sec>

      <Sec title="COMIDAS">
        {campos.map(([label, field, ph]) => {
          const m = parseMacros(data[field]||'');
          const hasMacros = m.p>0||m.c>0||m.g>0;
          return (
            <div key={field} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <div style={{fontSize:15,color:G.mu}}>{label}</div>
                {hasMacros && (
                  <div style={{fontSize:15,fontFamily:'monospace',color:G.dim}}>
                    <span style={{color:G.acc}}>P:{m.p}g</span>{' '}
                    <span style={{color:G.warn}}>C:{m.c}g</span>{' '}
                    <span style={{color:G.coa}}>G:{m.g}g</span>{' '}
                    <span style={{color:G.mu}}>({m.p*4+m.c*4+m.g*9}kcal)</span>
                  </div>
                )}
              </div>
              <Inp value={data[field]||''} onChange={e=>upd(field,e.target.value)} placeholder={ph} />
            </div>
          );
        })}
      </Sec>

        <Rating label="Hambre general" value={data.hambre||''} onChange={v=>upd('hambre',v)} color={G.warn} mode="negative" />
        <div style={{marginTop:8}}>
          <div style={{fontSize:15,color:G.mu,marginBottom:4}}>Digestion</div>
          <select value={data.digestion||''} onChange={e=>upd('digestion',e.target.value)} style={{background:G.alt,border:'1px solid '+G.bor,color:G.dim,borderRadius:8,padding:'7px 10px',fontSize:15,width:'100%',outline:'none'}}>
            <option value="">—</option>
            <option>Excelente</option>
            <option>Buena</option>
            <option>Regular</option>
            <option>Mala</option>
          </select>
        </div>
      </Sec>

// Parsea la presentaci\u00F3n para extraer cantidad total del envase
const parsePresentacion = (pres) => {
  const match = pres.match(/(\d+(?:\.\d+)?)\s*(g|kg|caps|softgels|packs)/i);
  if(!match) return null;
  let qty = parseFloat(match[1]);
  const unit = match[2].toLowerCase();
  if(unit === 'kg') qty *= 1000;
  return qty;
};

function TabLogistica({user, cfg}) {
  const [vista, setVista] = useState('compras');
  const [shopList, setShopList] = useState({});
  const [stockList, setStockList] = useState({});
  const [loading, setLoading] = useState(true);
  const userKey = cfg.nombre.toLowerCase();

  // Cargar datos desde Supabase (tabla mediciones usando tipo='logistica')
  useEffect(() => {
    (async () => {
      try {
        const { data } = await sb.from('nutricion')
          .select('notas')
          .eq('user_id', user.id)
          .eq('fecha', '2099-12-31') // Registro permanente para logistica
          .maybeSingle();
        if(data && data.notas) {
          const n = JSON.parse(data.notas);
          setShopList(n.shopList || {});
          setStockList(n.stockList || {});
        }
      } catch(e) { console.error('Load logistica:', e); }
      setLoading(false);
    })();
  }, [user.id]);

  // Guardar con debounce
  const saveRef = useRef(null);
  const saveData = (nShop, nStock) => {
    if(saveRef.current) clearTimeout(saveRef.current);
    saveRef.current = setTimeout(async () => {
      try {
        await sb.from('nutricion').upsert({
          user_id: user.id,
          fecha: '2099-12-31',
          notas: JSON.stringify({ shopList: nShop, stockList: nStock })
        }, { onConflict:'user_id,fecha' });
      } catch(e) { console.error('Save logistica:', e); }
    }, 800);
  };

  const toggleShopItem = (catKey, itemId) => {
    const nShop = {...shopList};
    const key = `${catKey}.${itemId}`;
    if(nShop[key]) {
      // Marcar como comprado con timestamp
      nShop[key] = { ...nShop[key], comprado: !nShop[key].comprado, fechaCompra: !nShop[key].comprado ? new Date().toISOString() : null };
    } else {
      nShop[key] = { comprado: true, fechaCompra: new Date().toISOString() };
    }
    setShopList(nShop);
    saveData(nShop, stockList);
  };

  const resetWeek = () => {
    if(!confirm('Reset lista de compras semanal? Se guardar\u00E1 el historial.')) return;
    const nShop = {};
    setShopList(nShop);
    saveData(nShop, stockList);
  };

  // Actualizar stock de suplemento (al comprar: registrar fecha compra)
  const markSuppBought = (suppId) => {
    const supp = (SUPP_STOCK_CATALOG[userKey]||SUPP_STOCK_CATALOG.ariel).find(s=>s.id===suppId);
    if(!supp) return;
    const nStock = {...stockList};
    nStock[suppId] = {
      fechaCompra: new Date().toISOString(),
      presentacion: supp.presentacion,
      dosisDia: supp.dosisDia,
      diasActivos: supp.diasActivos || 7
    };
    setStockList(nStock);
    saveData(shopList, nStock);
  };

  const deleteSuppStock = (suppId) => {
    const nStock = {...stockList};
    delete nStock[suppId];
    setStockList(nStock);
    saveData(shopList, nStock);
  };

  // Calcular dias restantes hasta necesidad de recompra
  const calcDuracion = (supp, stockEntry) => {
    if(!stockEntry || !stockEntry.fechaCompra) return null;
    const cantTotal = parsePresentacion(supp.presentacion);
    if(!cantTotal) return null;
    const dosisDia = supp.dosisDia;
    const diasSem = supp.diasActivos || 7;
    const consumoSemanal = dosisDia * diasSem;
    const duracionSemanas = cantTotal / consumoSemanal;
    const duracionDias = Math.round(duracionSemanas * 7);
    const fechaCompra = new Date(stockEntry.fechaCompra);
    const hoyDt = new Date();
    const diasPasados = Math.floor((hoyDt - fechaCompra) / (1000*60*60*24));
    const diasRest = duracionDias - diasPasados;
    const fechaAgotado = new Date(fechaCompra.getTime() + duracionDias*24*60*60*1000);
    return { duracionDias, diasPasados, diasRest, fechaAgotado, pctRest: Math.max(0, Math.round((diasRest/duracionDias)*100)) };
  };

  if(loading) return React.createElement('div', {style:{color:G.mu,fontFamily:'monospace',padding:20,textAlign:'center'}}, 'Cargando log\u00EDstica...');

  const catalogShop = SHOPPING_CATALOG;

    React.createElement(Sec, null,
      React.createElement('div', {style:{display:'flex',gap:0,marginBottom:10,background:G.alt,borderRadius:10,padding:3,border:'1px solid '+G.bor}},
        [['compras','COMPRAS SEMANA','\u{1F6D2}'],['stock','SUPLEMENTOS MES','\u{1F48A}']].map(([v,l,ic]) => (
          React.createElement('button', {key:v, onClick:()=>setVista(v), style:{flex:1,background:vista===v?G.acc:'transparent',color:vista===v?'#fff':G.dim,border:'none',borderRadius:8,padding:'8px 10px',fontSize:15,fontWeight:700,fontFamily:'monospace',letterSpacing:0.5,cursor:'pointer',transition:'all 0.2s'}},
            ic+' '+l
          )
        ))
      ),
      vista==='compras' && React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
        React.createElement('div', null,
          React.createElement('div', {style:{fontSize:18,fontWeight:700,color:G.acc,fontFamily:'monospace'}}, shopPct+'%'),
          React.createElement('div', {style:{fontSize:15,color:G.mu}}, boughtItems+'/'+totalItems+' items')
        ),
        React.createElement('button', {onClick:resetWeek, style:{background:G.bad+'22',color:G.bad,border:'1px solid '+G.bad+'44',borderRadius:7,padding:'6px 12px',fontSize:15,fontWeight:700,cursor:'pointer'}}, '\u{1F504} Reset semana')
      )
    ),

    // ─── VISTA COMPRAS ───
    vista==='compras' && Object.entries(catalogShop).map(([catKey, cat]) =>
      React.createElement(Sec, {key:catKey, title:cat.label, color:cat.color},
        cat.items.map(item => {
          const key = `${catKey}.${item.id}`;

            React.createElement('div', {style:{width:28,height:28,borderRadius:8,border:'2px solid '+(isBought?G.ok:G.bor),background:isBought?G.ok:G.alt,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:15,color:'#fff'}}, isBought?'\u2713':''),
            React.createElement('div', {style:{flex:1}},
              React.createElement('div', {style:{fontSize:15,fontWeight:600,color:isBought?G.mu:G.dim}}, item.nombre),
              React.createElement('div', {style:{fontSize:13,color:G.mu,marginTop:2}}, item.nota)

            React.createElement('div', {style:{fontSize:15,fontFamily:'monospace',color:cat.color,fontWeight:700,flexShrink:0}}, cantidad+' '+item.unidad)
          );
        })
      )
    ),

    // ─── VISTA STOCK SUPLEMENTOS ───
    vista==='stock' && React.createElement(React.Fragment, null,
      React.createElement(Sec, {title:'\u{1F48A} INVENTARIO SUPLEMENTOS', color:G.coa},
        React.createElement('div', {style:{fontSize:13,color:G.mu,marginBottom:10,fontStyle:'italic',lineHeight:1.4}}, 'Al abrir un nuevo envase, marc\u00E1 "Comprado hoy". La app calcula cu\u00E1ndo se va a acabar seg\u00FAn tu dosis diaria y te avisa con anticipaci\u00F3n.'),
        catalogSupp.map(supp => {
          const stock = stockList[supp.id];

  const [loading, setLoading] = useState(true);

  useEffect(() => {
    getMediciones(user.id).then(({data}) => { if(data) setHist(data); setLoading(false); });
  }, [user.id]);

  const guardar = async () => {
    if(!form.peso && !form.cintura) return;
    const { data } = await saveMedicion(user.id, form);
    if(data?.[0]) setHist(h => [data[0], ...h]);
    setForm({fecha:hoy(), peso:'', cintura:'', notas:''});
  };

  const borrar = async id => {
    await delMedicion(id);
    setHist(h => h.filter(m => m.id !== id));
  };

  const ult = hist.slice(0,8);
  const tP = ult.length >= 2 ? (parseFloat(ult[0].peso)-parseFloat(ult[ult.length-1].peso)).toFixed(1) : null;
  const tC = ult.length >= 2 ? (parseFloat(ult[0].cintura)-parseFloat(ult[ult.length-1].cintura)).toFixed(1) : null;

  return (
    <div>
      {hist.length >= 2 && (
        <Sec title="TENDENCIA">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[['Peso',tP,'kg'],['Cintura',tC,'cm']].map(([l,v,u]) => (
              <div key={l} style={{padding:12,background:G.alt,borderRadius:8,textAlign:'center'}}>
                <div style={{fontSize:15,color:G.mu,marginBottom:4}}>{l}</div>
                <div style={{fontSize:22,fontWeight:700,fontFamily:'monospace',color:v!==null?(parseFloat(v)<=0?G.ok:G.warn):G.mu}}>
                  {v!==null ? (parseFloat(v)>0?'+':'')+v+' '+u : '--'}
                </div>
              </div>
            ))}
          </div>
        </Sec>

      <Sec title="NUEVA MEDICION">

          <div>

            <Inp type="number" step="0.1" value={form.peso} onChange={e=>setForm({...form,peso:e.target.value})} placeholder="75.5" />
          </div>
          <div>
            <div style={{fontSize:15,color:G.mu,marginBottom:3}}>Cintura cm</div>

          </div>
