const autoAuth = async (userId) => {
  // Intentar sesión existente
  const { data } = await sb.auth.getUser();
  if (data?.user) return { ...data.user, id: userId };
  // Si no hay sesión, intentar anónimo
  try {
    const { data: anonData } = await sb.auth.signInAnonymously();
    if (anonData?.user) return { ...anonData.user, id: userId };
  } catch(e) {}
  // Fallback: usuario local sin auth
  return { id: userId };
};

// Mapeo UI → BD para nutricion
// BD columns: id, user_id, fecha, ayuno_inicio, ayuno_fin, proteina, carbos, agua, comidas, notas, updated_at
const nutriUIToDB = (uiData) => {
  const db = {};
  if(uiData.ayuno_ini !== undefined) db.ayuno_inicio = uiData.ayuno_ini;
  if(uiData.ayuno_fin !== undefined) db.ayuno_fin = uiData.ayuno_fin;
  if(uiData.prot !== undefined) db.proteina = uiData.prot ? parseFloat(uiData.prot) : null;
  if(uiData.carbs !== undefined) db.carbos = uiData.carbs ? parseFloat(uiData.carbs) : null;
  if(uiData.agua !== undefined) db.agua = uiData.agua ? parseFloat(uiData.agua) : null;
  // Comidas: guardar como array JSON de objetos
  const comidas = [
    uiData.pre||'', uiData.intra||'', uiData.postInm||'', uiData.post60||'',
    uiData.c1||'', uiData.c2||'', uiData.cena||'', uiData.suple||''
  ];
  db.comidas = comidas;
  // Extras en notas como JSON — preservar plan data existente
  const extras = {};
  try { const existing = JSON.parse(uiData._notasRaw || '{}'); if(existing.plan) extras.plan = existing.plan; } catch {}
  if(uiData.hambre) extras.hambre = uiData.hambre;
  if(uiData.digestion) extras.digestion = uiData.digestion;
  db.notas = Object.keys(extras).length ? JSON.stringify(extras) : null;
  return db;
};
const nutriDBToUI = (dbData) => {
  if(!dbData) return {};
  const ui = {};
  ui.ayuno_ini = dbData.ayuno_inicio || '';
  ui.ayuno_fin = dbData.ayuno_fin || '';
  ui.prot = dbData.proteina != null ? String(dbData.proteina) : '';
  ui.carbs = dbData.carbos != null ? String(dbData.carbos) : '';
  ui.agua = dbData.agua != null ? String(dbData.agua) : '';
  // Comidas: array → campos individuales
  const c = dbData.comidas || [];
  ui.pre = c[0]||''; ui.intra = c[1]||''; ui.postInm = c[2]||''; ui.post60 = c[3]||'';
  ui.c1 = c[4]||''; ui.c2 = c[5]||''; ui.cena = c[6]||''; ui.suple = c[7]||'';
  // Extras de notas — preservar notas raw para plan data
  ui._notasRaw = dbData.notas || '{}';
  try { const n = JSON.parse(dbData.notas||'{}'); ui.hambre = n.hambre||''; ui.digestion = n.digestion||''; } catch { ui.hambre=''; ui.digestion=''; }
  return ui;
};
const saveNutricion = async (uid, fecha, uiData) => {
  try {

    const result = await sb.from('nutricion').upsert({ user_id:uid, fecha, ...dbData }, { onConflict:'user_id,fecha' });
    if(result.error) throw result.error;
    return { success: true, data: result.data };

    return { success: false, error: err.message || 'Error al guardar nutricion' };

};

// Calcular semana del periodo basado en fecha (semanas desde epoch mod 4 + 1)
const getSemPeriodo = (fecha) => {
  const d = new Date(fecha+'T12:00:00');
  const epoch = new Date('2026-04-06T12:00:00'); // Lun 6 Abr 2026 = inicio Semana 1
  const diffWeeks = Math.floor((d - epoch) / (7*24*60*60*1000));
  return ((diffWeeks % 4) + 4) % 4 + 1; // 1-4
};

// Mapeo dia de semana → tipo de plan nutricional
const getDayType = (dia) => {
  if(dia===1||dia===2||dia===4) return 'alta'; // Pecho+Espalda, Pierna AD, Pierna AT
  if(dia===3||dia===5) return 'media'; // Hombro+Pecho, Hombro+Espalda
  if(dia===6) return 'media_baja'; // Brazos + CF opcional
  return 'descanso'; // domingo
};

const getDayType_M = (dia) => {
  if(dia===1||dia===3||dia===5) return 'entreno';
  if(dia===4) return 'cardio';
  if(dia===2||dia===6) return 'ligero';
  return 'descanso';
};

// ─── HELPERS ────────────────────────────────────────────────────────────────
const hoy = () => new Date().toISOString().split('T')[0];
const diaHoy = () => new Date().getDay();
const fmtFecha = s => { if(!s) return ''; const [y,m,d] = s.split('-'); return d+'/'+m+'/'+y; };
// Dado una fecha base y un dia de semana (0=Dom..6=Sab), calcula la fecha de ese dia en la misma semana (Lun-Dom)
const getWeekDate = (baseFecha, targetDia) => {
  const d = new Date(baseFecha + 'T12:00:00');
  const currentDia = d.getDay();
  // Calcular offset: semana Lun(1)-Dom(0)
  const currentMondayOffset = currentDia === 0 ? -6 : 1 - currentDia;
  const monday = new Date(d);
  monday.setDate(d.getDate() + currentMondayOffset);
  // Target offset from monday
  const targetOffset = targetDia === 0 ? 6 : targetDia - 1;
  const target = new Date(monday);
  target.setDate(monday.getDate() + targetOffset);
  return target.toISOString().split('T')[0];
};
// Mover una semana entera desde una fecha
const shiftWeek = (fecha, delta) => {
  const d = new Date(fecha + 'T12:00:00');
  d.setDate(d.getDate() + (delta * 7));
  return d.toISOString().split('T')[0];
};
const MESES_CORTOS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const fmtSemana = (fecha) => {
  const d = new Date(fecha + 'T12:00:00');
  const dia = d.getDay();
  const mondayOff = dia === 0 ? -6 : 1 - dia;
  const mon = new Date(d); mon.setDate(d.getDate() + mondayOff);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return mon.getDate() + ' ' + MESES_CORTOS[mon.getMonth()] + ' - ' + sun.getDate() + ' ' + MESES_CORTOS[sun.getMonth()];
};
// Componente reutilizable de navegacion semanal
const NavSemana = ({fecha, setFecha, dia, setDia}) => {
  const estaHoy = fecha === hoy();
  const cambiarDia = (d) => { setDia(d); setFecha(getWeekDate(fecha, d)); };
  return React.createElement('div', {style:{marginBottom:12}},
    React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
      React.createElement('button', {onClick:()=>{const nf=shiftWeek(fecha,-1);setFecha(nf);setDia(new Date(nf+'T12:00').getDay());}, style:{background:G.alt,color:G.dim,border:'1px solid '+G.bor,borderRadius:7,padding:'4px 10px',fontSize:11}}, '\u{25C0} Sem ant'),
      React.createElement('span', {style:{fontSize:11,color:estaHoy?G.acc:G.dim,fontWeight:600}}, fmtSemana(fecha)),
      React.createElement('button', {onClick:()=>{const nf=shiftWeek(fecha,1);setFecha(nf);setDia(new Date(nf+'T12:00').getDay());}, style:{background:G.alt,color:G.dim,border:'1px solid '+G.bor,borderRadius:7,padding:'4px 10px',fontSize:11}}, 'Sem sig \u{25B6}')
    ),
    React.createElement('div', {style:{display:'flex',gap:4,flexWrap:'wrap'}},
      [1,2,3,4,5,6,0].map(d => {
        const f = getWeekDate(fecha, d);
        const esHoy = f === hoy();
        const esSel = dia === d;
        return React.createElement('button', {key:d, onClick:()=>cambiarDia(d), style:{background:esSel?G.acc:G.alt,color:esSel?'#fff':esHoy?G.acc:G.dim,border:'1px solid '+(esSel?G.acc:esHoy?G.acc:G.bor),borderRadius:8,padding:'4px 8px',fontSize:10,fontWeight:600,flex:1,minWidth:38,textAlign:'center'}},
          DIAS[d] + ' ' + new Date(f+'T12:00').getDate()
        );
      })
    ),
    !estaHoy && React.createElement('button', {onClick:()=>{setFecha(hoy());setDia(diaHoy());}, style:{marginTop:6,background:'transparent',color:G.acc,border:'1px solid '+G.acc,borderRadius:7,padding:'3px 10px',fontSize:10,width:'100%'}}, 'Ir a hoy')
  );
};

// ─── MOTOR DE COACH AUTOMATICO ──────────────────────────────────────────────
const autoCoachAnalysis = (meta, prog, periodo, motivArr, meditArr) => {
  const tips = [];
  const ePre = parseInt(meta.ePre)||0;
  const ePost = parseInt(meta.ePost)||0;
  const fPre = parseInt(meta.fPre)||0;
  const fPost = parseInt(meta.fPost)||0;
  const pump = parseInt(meta.pump)||0;
  const sueno = parseFloat(meta.sueno)||0;
  const hPre = parseInt(meta.hPre)||0;
  const aPre = parseInt(meta.aPre)||0;
  const obs = meta.obs||'';

  // Sue\u00F1o
  if(sueno > 0 && sueno < 6) tips.push('\u{1F6A8} Sue\u00F1o cr\u00EDtico ('+sueno+'h). Priorizar magnesio PM, evitar caf\u00E9 post 12PM. Ma\u00F1ana considerar descarga.');
  else if(sueno > 0 && sueno < 7) tips.push('\u{26A0}\u{FE0F} Sue\u00F1o bajo ('+sueno+'h). Vigilar fatiga acumulada. Ashwagandha y magnesio esta noche.');

  // Energ\u00EDa y fatiga
  if(ePre > 0 && ePre <= 4) tips.push('\u{1F50B} Energ\u00EDa pre muy baja. Revisar calidad de sue\u00F1o, carbos del d\u00EDa anterior, hidrataci\u00F3n.');
  if(fPost > 7) tips.push('\u{1F4A4} Fatiga post alta ('+fPost+'/10). Ma\u00F1ana ser\u00E1 d\u00EDa de menor volumen. Glutamina + prote\u00EDna inmediata.');
  if(ePost > 0 && ePost <= 3 && fPost > 6) tips.push('\u{26A1} Sesion drenante. Aumentar carbos peri-entreno ma\u00F1ana (+10g). Considerar descarga si persiste.');
  if(pump >= 8) tips.push('\u{1F4AA} Gran pump ('+pump+'/10). Buena conexi\u00F3n mente-m\u00FAsculo. Mantener este rango de repeticiones.');

  // Ansiedad
  if(aPre > 6) tips.push('\u{1F9E0} Ansiedad alta pre-entreno. Recordar: respiraci\u00F3n 4-7-8 antes de dormir. Ashwagandha constante.');

  // Hambre
  if(hPre > 7) tips.push('\u{1F37D}\u{FE0F} Hambre excesiva pre. Ajustar cena de ayer: m\u00E1s prote\u00EDna + grasa antes de cerrar ventana.');

  // Observaciones espec\u00EDficas
  if(obs.includes('dolor') || obs.includes('molestia')) tips.push('\u{1F3E5} Reportaste dolor/molestia. Reducir carga 20% en esa zona m\u00EDnimo 2 d\u00EDas. Si persiste, evaluar.');
  if(obs.includes('pesada') || obs.includes('l\u00EDmite')) tips.push('\u{1F33F} Sesi\u00F3n al l\u00EDmite. Si es semana 2-3 del per\u00EDodo, es normal. Si es semana 1 o acumulas 3 d\u00EDas as\u00ED, adelantar descarga.');
  if(obs.includes('Incompleta')) tips.push('\u{1F504} Sesi\u00F3n incompleta. Completar lo pendiente el s\u00E1bado en bloque Pendientes.');
  if(obs.includes('insomnio') || obs.includes('sue\u00F1o')) tips.push('\u{1F31C} Afectado por sue\u00F1o. Esta noche: magnesio 400mg + apagar pantallas 1h antes. Sin caf\u00E9 despu\u00E9s de medio d\u00EDa.');

  // Periorizaci\u00F3n
  if(periodo) {
    if(periodo === 3 && fPost > 7) tips.push('\u{1F4CA} Semana intensificaci\u00F3n + fatiga alta = respuesta normal. Semana que viene es DESCARGA.');
    if(periodo === 4) tips.push('\u{1F33F} Semana descarga: hoy fue buen d\u00EDa para reducir volumen. Mantener t\u00E9cnica, bajar carga.');
  }

  // Si todo va bien
  if(tips.length === 0 && ePost >= 5 && fPost <= 5 && pump >= 5) {
    tips.push('\u{2705} Sesi\u00F3n s\u00F3lida. Mantener plan. Buen balance energ\u00EDa/fatiga.');
  } else if(tips.length === 0) {
    tips.push('\u{1F4CB} Completa las escalas de energ\u00EDa, fatiga y pump para recibir recomendaciones del coach.');
  }

  // ─── FRASES MOTIVACIONALES (cuando la sesi\u00F3n fue buena) ───
  // Usar fecha como seed para que cambie cada d\u00EDa
  const seed = new Date().toISOString().split('T')[0].split('-').reduce((a,b)=>a+parseInt(b),0);
  const buenoSesion = (ePost >= 6 && fPost <= 6) || pump >= 7 || obs.includes('Excelente') || obs.includes('Mejor');
  if(buenoSesion) {
    tips.push('\u{1F525} ' + motivArr[seed % motivArr.length]);
  }
  tips.push('\u{1F9D8} ' + meditArr[(seed + 7) % meditArr.length]);

  return tips;
};

const getRirColor = rir => {
  const r = parseInt(rir);
  if(!rir || rir==='-') return G.mu;
  if(r <= 1) return '#ef4444';
  if(r <= 2) return '#f97316';
  if(r <= 3) return '#eab308';
  return '#22c55e';
};
const getRirLabel = rir => {
  const r = parseInt(rir);
  if(!rir || rir==='-') return '';
  if(r <= 1) return 'MAXIMO';
  if(r <= 2) return 'ALTO';
  if(r <= 3) return 'MEDIO';
  return 'MODERADO';
};

// ─── SAVE STATUS COMPONENT ───────────────────────────────────────────────────
function SaveStatus({status, message, onRetry}) {
  if(!status) return null;

  let bgColor = G.alt, textColor = G.mu, icon = '...';
  if(status === 'saving') {
    bgColor = G.acc + '22';
    textColor = G.acc;
    icon = '⟳';
  } else if(status === 'saved') {
    bgColor = G.ok + '22';
    textColor = G.ok;
    icon = '✓';
  } else if(status === 'error') {
    bgColor = G.bad + '22';
    textColor = G.bad;
    icon = '✗';
  }

  return (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:bgColor,borderRadius:6,fontSize:11,color:textColor,whiteSpace:'nowrap'}}>
      <span style={status==='saving'?{animation:'spin 1s linear infinite'}:{}}>{icon}</span>
      <span>{message}</span>
      {status==='error' && onRetry && (
        <button onClick={onRetry} style={{background:'none',color:textColor,border:'1px solid '+textColor,borderRadius:3,padding:'1px 6px',fontSize:10,marginLeft:4}}>Reintentar</button>
      )}
    </div>
  );
}

// ─── TAB ENTRENO ─────────────────────────────────────────────────────────────
function TabEntreno({user, cfg}) {
  const [dia, setDia] = useState(diaHoy());
  const [fecha, setFecha] = useState(hoy());
  const [reg, setReg] = useState({});
  const [meta, setMeta] = useState({inicio:'',fin:'',sueno:'',ayuno:'',ePre:'',fPre:'',hPre:'',aPre:'',ePost:'',fPost:'',hPost:'',aPost:'',pump:'',obs:'',coach:''});
  const [saveStatus, setSaveStatus] = useState(null); // null | 'saving' | 'saved' | 'error'
  const [saveMessage, setSaveMessage] = useState('');
  const [vista, setVista] = useState('hoy');
  const [historial, setHistorial] = useState([]);
  const [loadHist, setLoadHist] = useState(false);
  const [loading, setLoading] = useState(true);
  const saveDebounceRef = useRef(null);
  const saveTimeoutRef = useRef(null);

  const prog = cfg.prog[dia] || cfg.prog[1];

  useEffect(() => {
    setSaveStatus(null);
    setLoading(true);
    getEntreno(user.id, fecha, dia).then(({data}) => {
      if(data) {
        setReg(data.ejercicios || {});
        try { const n = JSON.parse(data.notas||'{}'); setMeta(m=>({...m,...n})); } catch {}
      } else {
        setReg({});
        setMeta({inicio:'',fin:'',sueno:'',ayuno:'',ePre:'',fPre:'',hPre:'',aPre:'',ePost:'',fPost:'',hPost:'',aPost:'',pump:'',obs:'',coach:''});
      }
      setLoading(false);
    }).catch(err => {
      console.error('Error loading entreno:', err);
      setLoading(false);
    });
  }, [fecha, dia, user.id]);

  const performSave = useCallback(async (r, m) => {
    setSaveStatus('saving');
    setSaveMessage('Guardando...');

    try {
      const result = await saveEntreno(user.id, fecha, dia, r, JSON.stringify(m));
      if(result.success) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        setSaveStatus('saved');
        setSaveMessage('Guardado ' + timeStr);

        // Clear saved status after 3 seconds
        if(saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => {
          setSaveStatus(null);
          setSaveMessage('');
        }, 3000);
      } else {
        setSaveStatus('error');
        setSaveMessage('Error: ' + result.error);
      }
    } catch(err) {
      setSaveStatus('error');
      setSaveMessage('Error al guardar: ' + err.message);
    }
  }, [user.id, fecha, dia]);

  const debouncedSave = useCallback((r, m) => {
    if(saveDebounceRef.current) clearTimeout(saveDebounceRef.current);

    setSaveStatus('saving');
    setSaveMessage('Guardando en 500ms...');

    saveDebounceRef.current = setTimeout(() => {
      performSave(r, m);
    }, 500);
  }, [performSave]);

  const forceManualSave = useCallback(async () => {
    if(saveDebounceRef.current) clearTimeout(saveDebounceRef.current);
    await performSave(reg, meta);
  }, [reg, meta, performSave]);

  const updSet = (key, si, field, val) => {
    const nr = {...reg, [key]: {...reg[key], [si]: {...(reg[key]?.[si]||{}), [field]:val}}};
    setReg(nr);
    debouncedSave(nr, meta);
  };

  const updEjMeta = (key, field, val) => {
    const nr = {...reg, [key+'_m']: {...(reg[key+'_m']||{}), [field]:val}};
    setReg(nr);

    const vals = [];
    (prog.bloques||[]).forEach((bl,bi) => {
      (bl.ejercicios||[]).forEach((_,ei) => {
        const v = (bi===0&&ei===0&&key==='b0_0'?val:null) || nr['b'+bi+'_'+ei+'_m']?.[field];
        if(v) vals.push(parseInt(v));
      });
    });
    let nm = meta;
    if(vals.length > 0) {
      const avg = String(Math.round(vals.reduce((a,b)=>a+b,0)/vals.length));
      nm = {...meta, [field==='e'?'ePost':'fPost']: avg};
      setMeta(nm);
    }
    debouncedSave(nr, nm);
  };

  const updMeta = (f, v) => {
    const nm = {...meta, [f]:v};
    setMeta(nm);
    debouncedSave(reg, nm);
  };

  const duracion = () => {
    if(!meta.inicio||!meta.fin) return null;
    const [h1,m1] = meta.inicio.split(':').map(Number);
    const [h2,m2] = meta.fin.split(':').map(Number);
    let d = (h2*60+m2)-(h1*60+m1);
    if(d<0) d+=1440;
    return (d/60).toFixed(1);
  };

  const verHistorial = async () => {
    setLoadHist(true);
    const { data } = await getHistorialEntreno(user.id);
    setHistorial(data || []);
    setLoadHist(false);
    setVista('historial');
  };

  const cargarSesion = async (f, d) => {
    setFecha(f); setDia(d); setVista('hoy');
  };

  const imprimir = () => {
    const bloqueHtml = (prog.bloques||[]).map(bl => {
      const esBi = bl.ejercicios.length > 1;
      return `<div style="margin-bottom:12px">
        <div style="background:#333;color:#fff;padding:5px 10px;font-size:12px;font-weight:bold">${bl.nombre}${esBi?' (BISERIE)':''}</div>
        ${bl.ejercicios.map((ej,ei) => {
          const key = 'b'+prog.bloques.indexOf(bl)+'_'+ei;
          const rc = getRirColor(ej.rir);
          let rows = '';
          for(let s=0;s<ej.sets;s++){
            const sr = reg[key]?.[s]||{};
            rows += `<tr><td>${s+1}</td><td>${sr.peso||''}</td><td>${sr.reps||''}</td><td>${sr.rir||''}</td><td>${sr.rpe||''}</td><td>${sr.notas||''}</td></tr>`;
          }
          return `<div style="margin:4px 0;border-left:3px solid ${rc};padding-left:8px">
            <div style="font-weight:bold;font-size:13px">${ej.nombre} <span style="color:#888;font-size:11px">(${ej.musculo})</span> — ${ej.sets}x${ej.reps} RIR ${ej.rir}</div>
            ${ej.tecnica?`<div style="font-size:10px;color:#666;font-style:italic;margin:2px 0">${ej.tecnica}</div>`:''}
            <table border="1" style="width:100%;border-collapse:collapse;margin-top:4px;font-size:11px">
              <tr style="background:#f0f0f0"><th>Set</th><th>Peso kg</th><th>Reps</th><th>RIR</th><th>RPE</th><th>Notas</th></tr>
              ${rows}
            </table></div>`;
        }).join('')}
      </div>`;
    }).join('');

    const w = window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${prog.nombre} - ${fmtFecha(fecha)}</title>
    <style>body{font-family:sans-serif;padding:20px;color:#111;font-size:13px}h1{font-size:18px}@media print{button{display:none}}</style></head>

    <p style="color:#888;font-size:12px;margin-bottom:12px">Tipo: ${(prog.tipo||'').toUpperCase()} | Carbos: ${prog.carbos} | Inicio: ${meta.inicio||'--'} | Fin: ${meta.fin||'--'} | ${duracion()?duracion()+'h':''}</p>

    ${meta.obs?`<div style="margin-top:12px"><b>Observaciones:</b><p>${meta.obs}</p></div>`:''}
    ${meta.coach?`<div style="margin-top:8px"><b>Coach:</b><p style="color:#7c3aed">${meta.coach}</p></div>`:''}
    </body></html>`);
    w.document.close();
  };

  if(vista === 'historial') return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:700}}>Historial de sesiones</div>
        <button onClick={()=>setVista('hoy')} style={{background:G.alt,color:G.dim,border:'1px solid '+G.bor,borderRadius:7,padding:'5px 12px',fontSize:12}}>Volver</button>
      </div>
      {loadHist ? <div style={{color:G.mu,textAlign:'center',padding:20}}>Cargando...</div> :
       historial.length === 0 ? <div style={{color:G.mu,padding:20,textAlign:'center'}}>Sin sesiones guardadas</div> :
       historial.map((s,i) => {
         const p = PROG[s.dia_semana];
         let notas = {};
         try { notas = JSON.parse(s.notas||'{}'); } catch {}
         return (
           <div key={i} onClick={()=>cargarSesion(s.fecha,s.dia_semana)} style={{background:G.sur,border:'1px solid '+G.bor,borderRadius:10,padding:12,marginBottom:8,cursor:'pointer'}}>
             <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
               <div>
                 <div style={{fontWeight:600,fontSize:13}}>{p?.nombre || 'Dia '+s.dia_semana}</div>
                 <div style={{fontSize:11,color:G.mu}}>{fmtFecha(s.fecha)}</div>
               </div>
               <div style={{textAlign:'right',fontSize:12,color:G.dim}}>
                 {notas.ePost && <span>E:{notas.ePost}/10 </span>}
                 {notas.pump && <span>P:{notas.pump}/10</span>}
               </div>
             </div>
           </div>
         );
       })
      }
    </div>
  );

  const dur = duracion();

  if(loading) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:40,color:G.mu}}>
        <span style={{animation:'spin 1s linear infinite'}}>⟳</span> Cargando sesion...
      </div>
    );
  }

  return (
    <div>
      <Sec>
        <NavSemana fecha={fecha} setFecha={setFecha} dia={dia} setDia={setDia} />

        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:10}}>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontWeight:700,fontSize:15}}>{prog.nombre} <span style={{fontSize:11,color:G.mu,fontWeight:400}}>{fmtFecha(fecha)}</span></div>
            <div style={{display:'flex',gap:6,alignItems:'center',marginTop:3,flexWrap:'wrap'}}>
              <span style={{background:(TC[prog.tipo]||G.mu)+'22',color:TC[prog.tipo]||G.mu,borderRadius:4,padding:'2px 8px',fontSize:10,fontFamily:'monospace',fontWeight:700,letterSpacing:1}}>{(prog.tipo||'').toUpperCase()}</span>

        const bt = BT[bloque.btipo] || G.acc;

        return (

        {(meta.obs||'').includes('Otro:') && (

            <div style={{fontSize:11,color:G.mu,marginBottom:4}}>Nota personalizada</div>
            <textarea value={meta.obs_custom||''} onChange={e=>updMeta('obs_custom',e.target.value)} placeholder="Escribi lo que sentiste..." style={{background:G.alt,border:'1px solid '+G.bor,color:'#f1f5f9',borderRadius:10,padding:'9px 12px',fontSize:14,width:'100%',outline:'none',minHeight:50}} />
          </div>

        {meta.obs && (
          <div style={{background:G.alt,borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:12,color:G.dim}}>
            <span style={{color:G.mu,fontSize:10,fontFamily:'monospace'}}>RESUMEN: </span>{meta.obs}{meta.obs_custom ? ' \u2014 ' + meta.obs_custom : ''}
          </div>
        )}
      </Sec>

      <Sec title={'\u{1F9E0} DECISI\u00D3N DEL COACH'} color={G.acc}>
        {(() => {
          const sem = getSemPeriodo(fecha);
          const tips = autoCoachAnalysis(meta, prog, sem, cfg.motivacion||MOTIVACION_A, cfg.meditacion||MEDITACION_A);
          return (
            <div>
              {tips.map((tip, i) => (
                <div key={i} style={{background:G.alt,border:'1px solid '+G.bor,borderRadius:10,padding:'10px 14px',marginBottom:8,fontSize:13,color:G.dim,lineHeight:1.6}}>
                  {tip}
                </div>
              ))}
              <div style={{marginTop:10}}>
                <div style={{fontSize:11,color:G.mu,marginBottom:4}}>Nota adicional del coach (manual)</div>
                <textarea value={meta.coach||''} onChange={e=>updMeta('coach',e.target.value)} placeholder="Ajustes manuales, observaciones especiales..." style={{background:G.alt,border:'1px solid '+G.acc,color:'#f1f5f9',borderRadius:10,padding:'9px 12px',fontSize:14,width:'100%',outline:'none',minHeight:45}} />
              </div>
            </div>
          );
        })()}
      </Sec>
    </div>
  );
}

function SupChecklist({timing, label, color, checked, onChange, suplementos}) {
  const items = (suplementos||SUPLEMENTOS)[timing] || [];
  return React.createElement('div', {style:{background:G.sur,border:'1px solid '+color+'44',borderRadius:12,padding:14,marginBottom:12}},
    React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
      React.createElement('div', {style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:color,fontWeight:700}}, label),
      React.createElement('span', {style:{fontSize:11,color:G.mu,fontFamily:'monospace'}},
        items.filter(s => (checked||[]).includes(s.id)).length + '/' + items.length
      )
    ),
    items.map(sup =>
      React.createElement('div', {key:sup.id, onClick:()=>{
        const cur = checked||[];
        const next = cur.includes(sup.id) ? cur.filter(x=>x!==sup.id) : [...cur, sup.id];
        onChange(next);
      }, style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:(checked||[]).includes(sup.id)?color+'15':G.alt,border:'1px solid '+((checked||[]).includes(sup.id)?color+'55':G.bor),borderRadius:10,marginBottom:6,cursor:'pointer',transition:'all 0.2s'}},
        React.createElement('div', {style:{width:28,height:28,borderRadius:8,border:'2px solid '+((checked||[]).includes(sup.id)?color:G.bor),background:(checked||[]).includes(sup.id)?color:G.alt,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,color:'#fff',transition:'all 0.2s'}},
          (checked||[]).includes(sup.id) ? '\u2713' : ''
        ),
        React.createElement('div', {style:{flex:1}},
          React.createElement('div', {style:{fontSize:13,fontWeight:600,color:(checked||[]).includes(sup.id)?'#e2e8f0':G.dim}}, sup.emoji + ' ' + sup.nombre),
          React.createElement('div', {style:{fontSize:11,color:G.mu,marginTop:2}}, sup.timing)
        )
      )
    )
  );
}

        )
      )
    ),

      React.createElement('button', {onClick:onToggleEdit, style:{background:'none',border:'none',color:G.acc,fontSize:10,cursor:'pointer',padding:'2px 4px'}}, showEdit ? '\u{25B2} Cerrar' : '\u{270F}\u{FE0F} Editar real'),
      override && React.createElement('span', {style:{fontSize:10,color:G.warn,fontFamily:'monospace'}}, '\u{1F4DD} Editado')
    ),
    showEdit && React.createElement('div', {style:{padding:'8px 14px 12px',borderTop:'1px solid '+G.bor,background:G.alt}},
      React.createElement('div', {style:{fontSize:11,color:G.mu,marginBottom:4}}, '\u00BFComiste algo diferente? Escribe aqu\u00ED con macros (ej: P:30g C:5g G:10g)'),
      React.createElement('input', {value:override||'', onChange:e=>onOverride(e.target.value), placeholder:'Ej: 3 huevos + aguacate | P:25g C:2g G:20g', style:{background:G.bg,border:'1px solid '+G.bor,color:'#e2e8f0',borderRadius:8,padding:'8px 10px',fontSize:12,width:'100%',outline:'none'}})
    )

function PlanDelDia({fecha, dia, planData, onUpdate, cfg}) {
  const tipo = cfg.getDayType(dia);
  const plan = cfg.planes[tipo];
  if(!plan) return null;

  const checkedSupAM = planData.sup_am || [];
  const checkedSupPOST = planData.sup_post || [];
  const checkedSupPM = planData.sup_pm || [];
  const checkedMeals = planData.meals_checked || [];
  const overrides = planData.overrides || {};
  const [editingMeal, setEditingMeal] = useState(null);

  const toggleMeal = (mealId) => {
    const cur = planData.meals_checked || [];
    const next = cur.includes(mealId) ? cur.filter(x=>x!==mealId) : [...cur, mealId];
    onUpdate({...planData, meals_checked:next});
  };

  const setOverride = (mealId, val) => {
    const ov = {...(planData.overrides||{}), [mealId]:val};
    if(!val) delete ov[mealId];
    onUpdate({...planData, overrides:ov});
  };

  // Progress calc (excluir pre/intra/post de comidas, ya estan en suplementos)
  const SUPLE_MEAL_IDS = ['pre','intra','post'];
  const totalSups = (cfg.suplementos.AM||[]).length + (cfg.suplementos.POST||[]).length + (cfg.suplementos.PM||[]).length;
  const doneSups = checkedSupAM.length + checkedSupPOST.length + checkedSupPM.length;
  const totalMeals = plan.comidas.filter(c=>c.id!=='ayuno' && !SUPLE_MEAL_IDS.includes(c.id)).length;
  const doneMeals = checkedMeals.filter(id => plan.comidas.some(c=>c.id===id&&c.id!=='ayuno' && !SUPLE_MEAL_IDS.includes(c.id))).length;
  const totalItems = totalSups + totalMeals;
  const doneItems = doneSups + doneMeals;
  const pctDone = totalItems > 0 ? Math.round(doneItems/totalItems*100) : 0;

  return React.createElement('div', null,
    // Header con progreso
    React.createElement(Sec, {color:plan.color},
      React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
        React.createElement('div', null,
          React.createElement('div', {style:{fontSize:14,fontWeight:700,color:plan.color}}, '\u{1F4CB} ' + plan.label),
          React.createElement('div', {style:{fontSize:11,color:G.mu,marginTop:2}}, 'Meta: ~' + plan.resumen.prot + 'g prot | ~' + plan.resumen.carbs + 'g carbs | ~' + plan.resumen.kcal + ' kcal')
        ),
        React.createElement('div', {style:{textAlign:'right'}},
          React.createElement('div', {style:{fontSize:22,fontWeight:700,fontFamily:'monospace',color:pctDone>=80?G.ok:pctDone>=50?G.warn:G.dim}}, pctDone + '%'),
          React.createElement('div', {style:{fontSize:11,color:G.mu}}, doneItems + '/' + totalItems + ' items')
        )
      ),
      React.createElement('div', {style:{height:6,background:G.alt,borderRadius:3,overflow:'hidden'}},
        React.createElement('div', {style:{height:'100%',width:pctDone+'%',background:pctDone>=80?G.ok:pctDone>=50?G.warn:G.acc,borderRadius:3,transition:'width 0.3s'}})
      ),
      plan.resumen.nota && React.createElement('div', {style:{fontSize:11,color:G.mu,marginTop:8,fontStyle:'italic'}}, '\u{1F4A1} ' + plan.resumen.nota)
    ),

    // Suplementos AM (solo si hay entreno AM)
    (tipo!=='crossfit' && tipo!=='descanso') && React.createElement(SupChecklist, {
      timing:'AM', label:'SUPLEMENTOS AM \u{2600}\u{FE0F}', color:G.acc,
      checked:checkedSupAM,
      onChange:(v)=>onUpdate({...planData, sup_am:v}),
      suplementos:cfg.suplementos
    }),

    // Comidas del plan
    React.createElement('div', {style:{marginBottom:12}},
      React.createElement('div', {style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:G.warn,fontWeight:700,marginBottom:10,paddingLeft:4}}, 'COMIDAS DEL D\u00CDA \u{1F372}'),
      plan.comidas.filter(c => !['pre','intra','post'].includes(c.id)).map(comida =>
        React.createElement(PlanMealBlock, {
          key:comida.id,
          comida:comida,
          isChecked:checkedMeals.includes(comida.id),
          onCheck:()=>toggleMeal(comida.id),
          override:overrides[comida.id]||'',
          onOverride:(v)=>setOverride(comida.id,v),
          showEdit:editingMeal===comida.id,
          onToggleEdit:()=>setEditingMeal(editingMeal===comida.id?null:comida.id)
        })
      )
    ),

    // Suplementos POST (solo si hay entreno)
    (tipo!=='descanso') && React.createElement(SupChecklist, {
      timing:'POST', label:'SUPLEMENTOS POST \u{1F4AA}', color:G.ok,
      checked:checkedSupPOST,
      onChange:(v)=>onUpdate({...planData, sup_post:v}),
      suplementos:cfg.suplementos
    }),

    // CrossFit tiene suplementos AM reubicados
    (tipo==='crossfit') && React.createElement(SupChecklist, {
      timing:'AM', label:'SUPLEMENTOS PRE-WOD \u{26A1}', color:G.warn,
      checked:checkedSupAM,
      onChange:(v)=>onUpdate({...planData, sup_am:v}),
      suplementos:cfg.suplementos
    }),

    // Suplementos PM siempre
    React.createElement(SupChecklist, {
      timing:'PM', label:'SUPLEMENTOS PM \u{1F31C}', color:G.coa,
      checked:checkedSupPM,
      onChange:(v)=>onUpdate({...planData, sup_pm:v}),
      suplementos:cfg.suplementos
    }),

    // ─── RESUMEN CONSUMIDO HOY ───
    (() => {
      const pM = (txt) => { if(!txt) return {p:0,c:0,g:0,k:0}; const pm=txt.match(/P:~?(\d+)/i); const cm=txt.match(/C:~?(\d+)/i); const gm=txt.match(/G:~?(\d+)/i); return {p:pm?parseInt(pm[1]):0,c:cm?parseInt(cm[1]):0,g:gm?parseInt(gm[1]):0}; };
      const checked = plan.comidas.filter(c => checkedMeals.includes(c.id) && c.id!=='ayuno' && !['pre','intra','post'].includes(c.id));
      const overridden = checked.map(c => overrides[c.id] ? pM(overrides[c.id]) : pM(c.macros));
      // Auto-sumar macros de pre/post si suplementos correspondientes estan checkeados
      const preMeal = plan.comidas.find(c => c.id==='pre');
      const postMeal = plan.comidas.find(c => c.id==='post');
      if(preMeal && checkedSupAM.length > 0) overridden.push(pM(preMeal.macros));
      if(postMeal && checkedSupPOST.length > 0) overridden.push(pM(postMeal.macros));
      const tot = overridden.reduce((a,m) => ({p:a.p+m.p,c:a.c+m.c,g:a.g+m.g}), {p:0,c:0,g:0});
      tot.k = tot.p*4+tot.c*4+tot.g*9;
      const METAS = cfg.metas;
      if(doneItems===0) return null;
      return React.createElement(Sec, {color:G.ok},
        React.createElement('div', {style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:G.ok,fontWeight:700,marginBottom:10}}, '\u{2705} CONSUMIDO HOY'),
        React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,textAlign:'center'}},
          [{l:'Prote\u00EDna',v:tot.p,m:METAS.prot,u:'g',c:G.acc},{l:'Carbos',v:tot.c,m:METAS.carbs,u:'g',c:G.warn},{l:'Grasa',v:tot.g,m:METAS.grasa,u:'g',c:G.coa},{l:'Kcal',v:tot.k,m:METAS.kcal,u:'',c:G.dim}].map(x =>
            React.createElement('div', {key:x.l,style:{background:G.alt,borderRadius:8,padding:'8px 4px'}},
              React.createElement('div', {style:{fontSize:18,fontWeight:700,fontFamily:'monospace',color:x.v>=x.m*0.9?G.ok:x.c}}, x.v),
              React.createElement('div', {style:{fontSize:9,color:G.mu,marginTop:2}}, x.l),
              React.createElement('div', {style:{fontSize:9,color:G.mu}}, '/' + x.m + x.u)
            )
          )
        ),
        React.createElement('div', {style:{marginTop:8,fontSize:11,color:G.mu,textAlign:'center'}},
          checked.length + ' comida' + (checked.length>1?'s':'') + ' + ' + doneSups + ' suplementos registrados'
        )
      );
    })()
  );
}

// ─── TAB NUTRICION ────────────────────────────────────────────────────────────
function TabNutricion({user, cfg}) {
  const [fecha, setFecha] = useState(hoy());
  const [dia, setDia] = useState(diaHoy());
  const [data, setData] = useState({});
  const [vista, setVista] = useState('plan');
  const [planData, setPlanData] = useState({});
  const [saveStatus, setSaveStatus] = useState(null);
  const [saveMessage, setSaveMessage] = useState('');
  const saveDebounceRef = useRef(null);
  const saveTimeoutRef = useRef(null);
  const planSaveRef = useRef(null);
  const prog = cfg.prog[dia] || cfg.prog[1];

  useEffect(() => {
    setSaveStatus(null);
    setDia(new Date(fecha+'T12:00').getDay());
    getNutricion(user.id, fecha).then(({data:d}) => {
      setData(d || {});
      // Load plan data from raw notas JSON
      try {
        const raw = (d && d._notasRaw) ? d._notasRaw : '{}';
        const n = JSON.parse(raw);
        setPlanData(n.plan || {});
      } catch { setPlanData({}); }
    });
  }, [fecha, user.id]);

  const performSave = useCallback(async (nd) => {
    setSaveStatus('saving');
    setSaveMessage('Guardando...');

    try {
      const result = await saveNutricion(user.id, fecha, nd);
      if(result.success) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        setSaveStatus('saved');
        setSaveMessage('Guardado ' + timeStr);

        if(saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => {
          setSaveStatus(null);
          setSaveMessage('');
        }, 3000);
      } else {
        setSaveStatus('error');
        setSaveMessage('Error: ' + result.error);
      }
    } catch(err) {
      setSaveStatus('error');
      setSaveMessage('Error al guardar: ' + err.message);
    }
  }, [user.id, fecha]);

  const upd = (f, v) => {
    const nd = {...data, [f]:v};
    setData(nd);
    if(saveDebounceRef.current) clearTimeout(saveDebounceRef.current);

    setSaveStatus('saving');
    setSaveMessage('Guardando en 500ms...');

    saveDebounceRef.current = setTimeout(() => {
      performSave(nd);
    }, 500);
  };

  const forceManualSave = useCallback(async () => {
    if(saveDebounceRef.current) clearTimeout(saveDebounceRef.current);
    await performSave(data);
  }, [data, performSave]);

  const updatePlanData = useCallback((newPlan) => {
    setPlanData(newPlan);
    setSaveStatus('saving');
    setSaveMessage('Guardando...');
    // Save plan data merged into notas field
    if(planSaveRef.current) clearTimeout(planSaveRef.current);
    planSaveRef.current = setTimeout(async () => {
      try {
        const existingNotas = {};
        try { Object.assign(existingNotas, JSON.parse(data._notasRaw || '{}')); } catch {}
        existingNotas.plan = newPlan;
        // Preserve hambre/digestion at top level
        if(data.hambre) existingNotas.hambre = data.hambre;
        if(data.digestion) existingNotas.digestion = data.digestion;
        
        // Also save the notas field directly via upsert
        
        
        // Only upsert notas field
        const result = await sb.from('nutricion').upsert({ user_id:user.id, fecha, notas: JSON.stringify(existingNotas) }, { onConflict:'user_id,fecha' });
        if(result.error) throw result.error;
        // Update _notasRaw so future saves preserve plan
        setData(prev => ({...prev, _notasRaw: JSON.stringify(existingNotas)}));
        const timeStr = new Date().toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        setSaveStatus('saved');
        setSaveMessage('Guardado ' + timeStr);
        if(saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => { setSaveStatus(null); setSaveMessage(''); }, 3000);
      } catch(e) {
        console.error('Plan save error:', e);
        setSaveStatus('error');
        setSaveMessage('Error al guardar plan');
      }
    }, 600);
  }, [data, user.id, fecha]);

  const calcAyuno = () => {
    if(!data.ayuno_ini || !data.ayuno_fin) return null;
    const [h1,m1] = data.ayuno_ini.split(':').map(Number);
    const [h2,m2] = data.ayuno_fin.split(':').map(Number);
    let d = (h2*60+m2)-(h1*60+m1);
    if(d<0) d+=1440;
    return (d/60).toFixed(1);
  };
  const hrs = calcAyuno();

  // Metas diarias
  const METAS = cfg.metas;

  // Parsear macros de cada comida: "texto | P:20g C:0 G:5g"
  const parseMacros = (txt) => {
    if(!txt) return { p:0, c:0, g:0 };
    const pm = txt.match(/P:~?(\d+)/i); const cm = txt.match(/C:~?(\d+)/i); const gm = txt.match(/G:~?(\d+)/i);
    return { p: pm?parseInt(pm[1]):0, c: cm?parseInt(cm[1]):0, g: gm?parseInt(gm[1]):0 };
  };

  // Calcular totales de todas las comidas
  const campos = [
    ['Pre-entreno','pre','EAA, colageno... | P:20g C:0 G:0'],
    ['Intra-entreno','intra','Agua + sal... | P:0 C:0 G:0'],
    ['Post inmediato','postInm','Proteina... | P:40g C:2g G:1g'],
    ['Post 30-60 min','post60','Comida... | P:30g C:3g G:25g'],
    ['Comida 2','c1','Desc... | P:20g C:5g G:8g'],
    ['Comida 3','c2','Desc... | P:25g C:7g G:33g'],
    ['Cena','cena','Desc... | P:50g C:2g G:20g'],
    ['Suplementos','suple','Creatina, vitaminas...']
  ];

  const totales = campos.reduce((acc, [,field]) => {
    const m = parseMacros(data[field]||'');
    return { p: acc.p+m.p, c: acc.c+m.c, g: acc.g+m.g };
  }, { p:0, c:0, g:0 });
  totales.kcal = totales.p*4 + totales.c*4 + totales.g*9;

  const pctP = Math.min(100, Math.round(totales.p/METAS.prot*100));
  const pctC = Math.min(100, Math.round(totales.c/METAS.carbs*100));
  const pctG = Math.min(100, Math.round(totales.g/METAS.grasa*100));
  const pctK = Math.min(100, Math.round(totales.kcal/METAS.kcal*100));
  const aguaPct = Math.min(100, Math.round(parseFloat(data.agua||0)/METAS.agua*100));

  const BarMacro = ({label, current, target, pct, color, unit}) => (
    <div style={{marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:3}}>
        <span style={{color:G.dim}}>{label}</span>
        <span style={{fontFamily:'monospace',color:pct>=100?G.ok:color}}>
          <b>{current}</b>/{target}{unit} <span style={{fontSize:11,color:G.mu}}>({pct}%)</span>
        </span>
      </div>
      <div style={{height:6,background:G.alt,borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',width:pct+'%',background:pct>=90?G.ok:pct>=60?color:G.bad,borderRadius:3,transition:'width 0.3s'}}/>
      </div>
      {target-current>0 && <div style={{fontSize:11,color:G.mu,marginTop:2,textAlign:'right'}}>Faltan {target-current}{unit}</div>}
    </div>
  );

  return (
    <div>
      <Sec>
        <NavSemana fecha={fecha} setFecha={setFecha} dia={dia} setDia={setDia} />
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:700}}>{prog.nombre} <span style={{fontSize:11,color:G.mu,fontWeight:400}}>{fmtFecha(fecha)}</span></span>
          <span style={{marginLeft:'auto',fontSize:11,color:G.warn}}>Carbos: {prog.carbos}</span>
        </div>
        {/* TOGGLE PLAN / REGISTRO */}
        <div style={{display:'flex',gap:0,marginBottom:10,background:G.alt,borderRadius:10,padding:3,border:'1px solid '+G.bor}}>
          {[['plan','PLAN DEL D\u00CDA','\u{1F4CB}'],['actual','REGISTRO ACTUAL','\u{1F4DD}']].map(([v,l,ic]) => (
            <button key={v} onClick={()=>setVista(v)} style={{flex:1,background:vista===v?G.acc:'transparent',color:vista===v?'#fff':G.dim,border:'none',borderRadius:8,padding:'8px 10px',fontSize:11,fontWeight:700,fontFamily:'monospace',letterSpacing:0.5,cursor:'pointer',transition:'all 0.2s'}}>
              {ic} {l}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {vista==='actual' && <button onClick={forceManualSave} style={{background:G.acc,color:'#fff',border:'none',borderRadius:7,padding:'6px 14px',fontSize:11,fontWeight:600}}>GUARDAR AHORA</button>}
          {vista==='plan' && saveStatus==='saved' && <span style={{fontSize:11,color:G.ok,display:'flex',alignItems:'center',gap:4}}>{'\u2705'} Registro guardado</span>}
        </div>
        <SaveStatus status={saveStatus} message={saveMessage} onRetry={forceManualSave} />
      </Sec>

      {/* ─── VISTA: PLAN DEL DIA ─── */}
      {vista==='plan' && (
        <PlanDelDia fecha={fecha} dia={dia} planData={planData} onUpdate={updatePlanData} cfg={cfg} />
      )}

      {/* ─── VISTA: REGISTRO ACTUAL ─── */}
      {vista==='actual' && <>
      <Sec title="MACROS DEL DIA" color={G.acc}>
        <div style={{padding:'10px 12px',background:G.alt,borderRadius:10,marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:18,fontWeight:700,fontFamily:'monospace',color:pctK>=90?G.ok:G.acc}}>{totales.kcal}</span>
            <span style={{fontSize:11,color:G.mu}}>/ {METAS.kcal} kcal ({pctK}%)</span>
          </div>
          <BarMacro label="Proteina" current={totales.p} target={METAS.prot} pct={pctP} color={G.acc} unit="g" />
          <BarMacro label="Carbos netos" current={totales.c} target={METAS.carbs} pct={pctC} color={G.warn} unit="g" />
          <BarMacro label="Grasa" current={totales.g} target={METAS.grasa} pct={pctG} color={G.coa} unit="g" />
          <BarMacro label="Agua" current={parseFloat(data.agua||0)} target={METAS.agua} pct={aguaPct} color='#38bdf8' unit="L" />
        </div>
        {(() => {
          const alertas = [];
          const carbMax = parseInt(prog.carbos) || 40;
          if(totales.c > carbMax) alertas.push({tipo:'bad',msg:'\u26A0\uFE0F CARBOS EXCEDIDOS: '+totales.c+'g / max '+carbMax+'g \u2014 cuidar cetosis',icon:'\u{1F6AB}'});
          else if(totales.c > carbMax*0.85) alertas.push({tipo:'warn',msg:'\u26A1 Carbos al limite: '+totales.c+'g de '+carbMax+'g \u2014 vigilar proximas comidas',icon:'\u26A1'});
          if(totales.g > METAS.grasa*1.1) alertas.push({tipo:'warn',msg:'\u26A0\uFE0F GRASA alta: '+totales.g+'g / meta '+METAS.grasa+'g \u2014 moderar grasas restantes',icon:'\u{1F9C8}'});
          if(pctP < 50 && new Date().getHours() >= 16) alertas.push({tipo:'bad',msg:'\u{1F969} PROTEINA baja ('+totales.p+'g/'+METAS.prot+'g) \u2014 priorizar prote en comidas restantes',icon:'\u{1F969}'});
          else if(pctP < 70 && new Date().getHours() >= 20) alertas.push({tipo:'bad',msg:'\u{1F969} DEFICIT PROTEINA critico: '+totales.p+'g de '+METAS.prot+'g \u2014 falta '+(METAS.prot-totales.p)+'g antes de dormir',icon:'\u{1F969}'});
          if(parseFloat(data.agua||0) < 2 && new Date().getHours() >= 14) alertas.push({tipo:'warn',msg:'\u{1F4A7} AGUA baja: '+(data.agua||0)+'L \u2014 objetivo '+METAS.agua+'L, tomar mas',icon:'\u{1F4A7}'});
          if(totales.kcal > METAS.kcal*1.1) alertas.push({tipo:'warn',msg:'\u{1F525} CALORIAS excedidas: '+totales.kcal+' / '+METAS.kcal+' kcal',icon:'\u{1F525}'});
          if(totales.kcal < METAS.kcal*0.6 && new Date().getHours() >= 18) alertas.push({tipo:'warn',msg:'\u26A1 DEFICIT calorico alto: '+totales.kcal+'/'+METAS.kcal+' kcal \u2014 asegurar cena completa',icon:'\u26A1'});
          if(alertas.length === 0 && pctP >= 80 && pctK >= 70) alertas.push({tipo:'ok',msg:'\u2705 Macros en rango \u2014 vas bien, sigue asi',icon:'\u2705'});
          return alertas.length > 0 && (
            <div style={{marginTop:10}}>
              {alertas.map((a,i) => (
                <div key={i} style={{background:a.tipo==='bad'?'#ef444418':a.tipo==='warn'?'#f59e0b18':'#22c55e18',border:'1px solid '+(a.tipo==='bad'?'#ef444444':a.tipo==='warn'?'#f59e0b44':'#22c55e44'),borderRadius:8,padding:'8px 12px',marginBottom:6,fontSize:11,color:a.tipo==='bad'?'#fca5a5':a.tipo==='warn'?'#fde68a':'#86efac',display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{fontSize:14,flexShrink:0}}>{a.icon}</span>
                  <span>{a.msg}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </Sec>

      <Sec title="AYUNO" color={G.ok}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:8}}>
          <div>
            <div style={{fontSize:11,color:G.mu,marginBottom:3}}>Ultima comida</div>
            <Inp type="time" value={data.ayuno_ini||''} onChange={e=>upd('ayuno_ini',e.target.value)} />
          </div>
          <div>
            <div style={{fontSize:11,color:G.mu,marginBottom:3}}>Primera comida</div>
            <Inp type="time" value={data.ayuno_fin||''} onChange={e=>upd('ayuno_fin',e.target.value)} />
          </div>
        </div>
        {hrs && (
          <div style={{padding:'8px 12px',background:G.alt,borderRadius:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,color:G.mu}}>Duracion ayuno</span>
            <span style={{fontSize:22,fontWeight:700,fontFamily:'monospace',color:parseFloat(hrs)>=12?G.ok:G.warn}}>{hrs}h</span>
          </div>
        )}
      </Sec>

      <Sec title="COMIDAS">
        {campos.map(([label, field, ph]) => {
          const m = parseMacros(data[field]||'');
          const hasMacros = m.p>0||m.c>0||m.g>0;
          return (
            <div key={field} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <div style={{fontSize:11,color:G.mu}}>{label}</div>
                {hasMacros && (
                  <div style={{fontSize:10,fontFamily:'monospace',color:G.dim}}>
                    <span style={{color:G.acc}}>P:{m.p}g</span>{' '}
                    <span style={{color:G.warn}}>C:{m.c}g</span>{' '}
                    <span style={{color:G.coa}}>G:{m.g}g</span>{' '}
                    <span style={{color:G.mu}}>({m.p*4+m.c*4+m.g*9}kcal)</span>
                  </div>
                )}
              </div>
              <Inp value={data[field]||''} onChange={e=>upd(field,e.target.value)} placeholder={ph} />
            </div>
          );
        })}
      </Sec>

      <Sec title="AGUA + BIENESTAR">
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:G.mu,marginBottom:3}}>Agua (litros)</div>
          <Inp type="number" step="0.5" value={data.agua||''} onChange={e=>upd('agua',e.target.value)} placeholder="3.5" style={{textAlign:'center'}} />
        </div>
        <Rating label="Hambre general" value={data.hambre||''} onChange={v=>upd('hambre',v)} color={G.warn} />
        <div style={{marginTop:8}}>
          <div style={{fontSize:11,color:G.mu,marginBottom:4}}>Digestion</div>
          <select value={data.digestion||''} onChange={e=>upd('digestion',e.target.value)} style={{background:G.alt,border:'1px solid '+G.bor,color:'#e2e8f0',borderRadius:8,padding:'7px 10px',fontSize:13,width:'100%',outline:'none'}}>
            <option value="">—</option>
            <option>Excelente</option>
            <option>Buena</option>
            <option>Regular</option>
            <option>Mala</option>
          </select>
        </div>
      </Sec>
      </>}
    </div>
  );
}

// ─── TAB PROGRESO ─────────────────────────────────────────────────────────────
function TabProgreso({user}) {
  const [hist, setHist] = useState([]);
  const [form, setForm] = useState({fecha:hoy(), peso:'', cintura:'', notas:''});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    getMediciones(user.id).then(({data}) => { if(data) setHist(data); setLoading(false); });
  }, [user.id]);

  const guardar = async () => {
    if(!form.peso && !form.cintura) return;
    const { data } = await saveMedicion(user.id, form);
    if(data?.[0]) setHist(h => [data[0], ...h]);
    setForm({fecha:hoy(), peso:'', cintura:'', notas:''});
  };

  const borrar = async id => {
    await delMedicion(id);
    setHist(h => h.filter(m => m.id !== id));
  };

  const ult = hist.slice(0,8);
  const tP = ult.length >= 2 ? (parseFloat(ult[0].peso)-parseFloat(ult[ult.length-1].peso)).toFixed(1) : null;
  const tC = ult.length >= 2 ? (parseFloat(ult[0].cintura)-parseFloat(ult[ult.length-1].cintura)).toFixed(1) : null;

  return (
    <div>
      {hist.length >= 2 && (
        <Sec title="TENDENCIA">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[['Peso',tP,'kg'],['Cintura',tC,'cm']].map(([l,v,u]) => (
              <div key={l} style={{padding:12,background:G.alt,borderRadius:8,textAlign:'center'}}>
                <div style={{fontSize:11,color:G.mu,marginBottom:4}}>{l}</div>
                <div style={{fontSize:22,fontWeight:700,fontFamily:'monospace',color:v!==null?(parseFloat(v)<=0?G.ok:G.warn):G.mu}}>
                  {v!==null ? (parseFloat(v)>0?'+':'')+v+' '+u : '--'}
                </div>
              </div>
            ))}
          </div>
        </Sec>
      )}

      <Sec title="NUEVA MEDICION">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
          <div>
            <div style={{fontSize:11,color:G.mu,marginBottom:3}}>Fecha</div>
            <Inp type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})} />
          </div>
          <div>
            <div style={{fontSize:11,color:G.mu,marginBottom:3}}>Peso kg</div>
            <Inp type="number" step="0.1" value={form.peso} onChange={e=>setForm({...form,peso:e.target.value})} placeholder="75.5" />
          </div>
          <div>
            <div style={{fontSize:11,color:G.mu,marginBottom:3}}>Cintura cm</div>
            <Inp type="number" step="0.1" value={form.cintura} onChange={e=>setForm({...form,cintura:e.target.value})} placeholder="82" />
          </div>
        </div>
        <Inp value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})} placeholder="Condicion (en ayunas, post-entreno...)" style={{marginBottom:10}} />
        <button onClick={guardar} style={{background:G.acc,color:'#fff',borderRadius:8,padding:'9px 18px',fontSize:13,fontWeight:500,border:'none'}}>
          Guardar medicion
        </button>
      </Sec>

      {!loading && hist.length > 0 && (
        <Sec title="HISTORIAL">
          {hist.map((m,i) => (
            <div key={m.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:G.alt,borderRadius:8,marginBottom:5,flexWrap:'wrap'}}>
              {i===0 && <span style={{background:G.acc+'22',color:G.acc,borderRadius:3,padding:'1px 6px',fontSize:8,fontFamily:'monospace'}}>ULTIMO</span>}
              <span style={{fontSize:11,color:G.mu,fontFamily:'monospace'}}>{fmtFecha(m.fecha)}</span>
              {m.peso && <span style={{fontSize:14,fontWeight:700}}>{m.peso} kg</span>}
              {m.cintura && <span style={{fontSize:14,fontWeight:700,color:G.warn}}>{m.cintura} cm</span>}
              {m.notas && <span style={{fontSize:11,color:G.mu,flex:1}}>{m.notas}</span>}
              <button onClick={()=>borrar(m.id)} style={{background:'none',color:G.mu,fontSize:18,marginLeft:'auto',border:'none'}}>x</button>
            </div>
          ))}
        </Sec>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
const TABS = [
  {id:'entreno', label:'ENTRENO', icon:'H'},
  {id:'nutri', label:'NUTRICION', icon:'N'},
  {id:'progreso', label:'PROGRESO', icon:'P'}
];

function UserSelector({onSelect}) {
  const users = [
    {id:ARIEL_ID, nombre:'Ariel', desc:'49 a\u00F1os \u2022 CrossFit + Pesas \u2022 Keto flexible', color:'#a5b4fc', icon:'\u{1F3CB}'},
    {id:MELISSA_ID, nombre:'Melissa', desc:'45 a\u00F1os \u2022 Gym casa + Yoga \u2022 Keto fase 2', color:'#f0abfc', icon:'\u{1F9D8}'}
  ];
  return React.createElement('div', {style:{background:G.bg,minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20,backgroundImage:'radial-gradient(ellipse at 20% 0%,#312e8133 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,#581c8722 0%,transparent 50%)'}},
    React.createElement('div', {style:{fontFamily:'monospace',fontSize:14,fontWeight:700,letterSpacing:4,color:G.acc,marginBottom:6}}, 'FITTRACKER'),
    React.createElement('div', {style:{fontSize:12,color:G.mu,marginBottom:30}}, 'Selecciona tu perfil'),
    users.map(u =>
      React.createElement('button', {key:u.id, onClick:()=>onSelect(u.id), style:{background:G.sur+'cc',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',border:'2px solid '+u.color+'55',borderRadius:20,padding:'24px 30px',marginBottom:16,width:'100%',maxWidth:340,cursor:'pointer',textAlign:'left',boxShadow:'0 4px 24px rgba(0,0,0,0.25)',transition:'transform 0.15s,border-color 0.2s'}},
        React.createElement('div', {style:{display:'flex',alignItems:'center',gap:14}},
          React.createElement('div', {style:{fontSize:36}}, u.icon),
          React.createElement('div', null,
            React.createElement('div', {style:{fontSize:18,fontWeight:700,color:u.color,marginBottom:4}}, u.nombre),
            React.createElement('div', {style:{fontSize:12,color:G.dim}}, u.desc)
          )
        )
      )
    )
  );
}

function App() {
  const [userId, setUserId] = useState(null);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState('entreno');
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    if(!userId) return;
    setLoading(true);
    autoAuth(userId).then(u => { setUser(u); setLoading(false); });
  }, [userId]);

  if(!userId) return React.createElement(UserSelector, {onSelect:setUserId});

  if(loading || !user) return (
    React.createElement('div', {style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:G.bg,color:G.mu,fontFamily:'monospace',fontSize:12}},
      'Cargando...'
    )
  );

  const cfg = USER_CFG[userId] || USER_CFG[ARIEL_ID];

  return (
    React.createElement('div', {style:{background:G.bg,minHeight:'100vh',maxWidth:640,margin:'0 auto'}},
      React.createElement('div', {style:{background:G.sur+'ee',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:'1px solid '+G.bor,padding:'10px 16px 0',position:'sticky',top:0,zIndex:10,boxShadow:'0 2px 16px rgba(0,0,0,0.3)'}},
        React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
          React.createElement('div', {style:{fontFamily:'monospace',fontSize:12,fontWeight:700,letterSpacing:3,color:G.acc}}, 'FITTRACKER'),
          React.createElement('button', {onClick:()=>{setUserId(null);setUser(null);setTab('entreno');}, style:{background:'none',border:'1px solid '+G.bor,borderRadius:6,padding:'3px 10px',fontSize:11,color:cfg.nombre==='Melissa'?'#f0abfc':G.ok,cursor:'pointer',fontFamily:'monospace'}}, cfg.nombre + ' \u{25BC}')
        ),
        React.createElement('div', {style:{display:'flex',gap:2}},
          TABS.map(t => (
            React.createElement('button', {key:t.id, onClick:()=>setTab(t.id), style:{background:'none',color:tab===t.id?G.acc:G.mu,borderBottom:'2px solid '+(tab===t.id?G.acc:'transparent'),padding:'5px 14px',fontSize:10,fontWeight:700,fontFamily:'monospace',letterSpacing:1,border:'none',cursor:'pointer'}},
              t.label
            )
          ))
        )
      ),
      React.createElement('div', {style:{padding:14}},
        tab==='entreno' && React.createElement(TabEntreno, {user:user, cfg:cfg}),
        tab==='nutri' && React.createElement(TabNutricion, {user:user, cfg:cfg}),
        tab==='progreso' && React.createElement(TabProgreso, {user:user})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
