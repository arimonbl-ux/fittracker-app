// \u2500\u2500\u2500 CALCULO GASTO CALORICO \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const MET_BTIPO = {fuerza:6,tecnico:5.5,metcon:8,pump:3.5,aislamiento:4.5,warmup:3};

const calcGasto = (ejercicios, meta, prog, perfil) => {
  let tonnage=0, setsN=0, rpeS=0, rpeN=0;
  if(ejercicios && typeof ejercicios==='object'){
    Object.values(ejercicios).forEach(sd=>{
      if(sd && typeof sd==='object') Object.values(sd).forEach(s=>{
        if(s){
          const p=parseFloat(s.peso)||0, r=parseInt(s.reps)||0;
          if(p>0&&r>0){tonnage+=p*r;setsN++;}
          const rpe=parseFloat(s.rpe)||0;
          if(rpe>0){rpeS+=rpe;rpeN++;}
        }
      });
    });
  }
  let durMin=0;
  if(meta.inicio&&meta.fin){
    const [h1,m1]=meta.inicio.split(':').map(Number);
    const [h2,m2]=meta.fin.split(':').map(Number);
    durMin=(h2*60+m2)-(h1*60+m1); if(durMin<0) durMin+=1440;
  }
  let metS=0, bN=0;
  if(prog&&prog.bloques) prog.bloques.forEach(b=>{metS+=(MET_BTIPO[b.btipo]||4);bN++;});
  const avgMET=bN>0?metS/bN:5;
  const avgRPE=rpeN>0?rpeS/rpeN:6;
  const eat=durMin>0?(avgMET*perfil.peso*durMin)/60:0;
  const tBonus=tonnage*0.004;
  const epocF=avgRPE>7?0.15:avgRPE>5?0.10:0.06;
  const epoc=(eat+tBonus)*epocF;
  const neat=(3.5*perfil.peso*20)/60;
  const totalEAT=Math.round(eat+tBonus+epoc);
  return {tonnage:Math.round(tonnage),setsN,durMin,avgMET:+(avgMET).toFixed(1),avgRPE:+(avgRPE).toFixed(1),eat:Math.round(eat),tBonus:Math.round(tBonus),epoc:Math.round(epoc),neat:Math.round(neat),totalEAT,tmb:perfil.tmb,tdee:Math.round(perfil.tmb+totalEAT+neat)};
};

// Calcular ingesta desde plan checked o registro manual
const calcIngesta = (nutriData, planData, plan, cfg) => {
  const pM = (txt) => { if(!txt) return {p:0,c:0,g:0}; const pm=txt.match(/P:~?(\d+)/i); const cm=txt.match(/C:~?(\d+)/i); const gm=txt.match(/G:~?(\d+)/i); return {p:pm?parseInt(pm[1]):0,c:cm?parseInt(cm[1]):0,g:gm?parseInt(gm[1]):0}; };
  let prot=0, carbs=0, grasa=0, kcal=0, fuente='ninguna';

  // PRIORIDAD 1: Datos del tracker real (alimentos con gramos exactos)
  let totalAlcG = 0;
  if(planData && (planData.real || planData.sup_real)) {
    let rp=0, rc=0, rg=0, rAlc=0;
    const realMeals = planData.real || {};
    const realSups = planData.sup_real || {};
    const hasAny = Object.values(realMeals).some(m=>Object.keys(m).length>0) || Object.values(realSups).some(m=>Object.keys(m).length>0);
    if(hasAny) {
      [realMeals, realSups].forEach(src => {
        Object.values(src).forEach(items => {
          Object.entries(items).forEach(([alId,qty]) => {
            if(qty>0){ const m=calcAlMacros(alId,qty); rp+=m.p; rc+=m.c; rg+=m.g; rAlc+=(m.alcG||0); }
          });
        });
      });
      if(rp>0||rc>0||rg>0||rAlc>0) {
        prot=Math.round(rp); carbs=Math.round(rc); grasa=Math.round(rg);
        totalAlcG=Math.round(rAlc);
        kcal=Math.round(rp*4+rc*4+rg*9+rAlc*7);
        fuente='tracker';
      }
    }
  }

  // PRIORIDAD 2: Desde plan checklist
  if(fuente==='ninguna' && planData && plan && plan.comidas) {
    const checked = planData.meals_checked || [];
    const supAM = planData.sup_am || [];
    const supPOST = planData.sup_post || [];
    const mealItems = plan.comidas.filter(c => checked.includes(c.id) && c.id!=='ayuno' && !['pre','intra','post'].includes(c.id));
    const macros = mealItems.map(c => pM(c.macros));
    const preMeal = plan.comidas.find(c => c.id==='pre');
    const postMeal = plan.comidas.find(c => c.id==='post');
    if(preMeal && supAM.length>0) macros.push(pM(preMeal.macros));
    if(postMeal && supPOST.length>0) macros.push(pM(postMeal.macros));
    const tot = macros.reduce((a,m) => ({p:a.p+m.p,c:a.c+m.c,g:a.g+m.g}),{p:0,c:0,g:0});
    if(tot.p>0||tot.c>0||tot.g>0) {
      prot=tot.p; carbs=tot.c; grasa=tot.g; kcal=tot.p*4+tot.c*4+tot.g*9;
      fuente='plan';
    }
  }

  // PRIORIDAD 3: Registro manual
  if(fuente==='ninguna' && nutriData) {
    const mp = parseFloat(nutriData.prot)||0;
    const mc = parseFloat(nutriData.carbs)||0;
    if(mp>0||mc>0) {
      prot=mp; carbs=mc;
      grasa = Math.round((cfg.metas.kcal - prot*4 - carbs*4) / 9);
      kcal = prot*4 + carbs*4 + grasa*9;
      fuente='registro';
    }
  }

  return {prot,carbs,grasa,kcal,fuente,alcG:totalAlcG};
};

// \u2500\u2500\u2500 TAB BALANCE (GASTO vs INGESTA) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function TabBalance({user, cfg}) {
  const [dia, setDia] = useState(diaHoy());
  const [fecha, setFecha] = useState(hoy());
  const [gasto, setGasto] = useState(null);
  const [ingesta, setIngesta] = useState(null);
  const [meta, setMeta] = useState({});
  const [loading, setLoading] = useState(true);
  const [weekData, setWeekData] = useState([]);
  const [planDataBal, setPlanDataBal] = useState({});

  const perfil = cfg.perfil;
  const prog = cfg.prog[dia] || cfg.prog[1];
  const dayType = cfg.getDayType(dia);
  const plan = cfg.planes[dayType];

  // Cargar datos del dia
  useEffect(() => {
    setLoading(true);
    const loadDay = async () => {
      // Training data
      const eRes = await getEntreno(user.id, fecha, dia);
      const ejercicios = eRes.data?.ejercicios || {};
      const rawMeta = eRes.data?.notas || '{}';
      let parsedMeta = {};
      try { parsedMeta = JSON.parse(rawMeta); } catch {}

      // Nutrition data
      const nRes = await getNutricion(user.id, fecha);
      const nutriData = nRes.data || {};
      let planData = {};
      try { const raw = nutriData._notasRaw || '{}'; planData = JSON.parse(raw).plan || {}; } catch {}

      const g = calcGasto(ejercicios, parsedMeta, prog, perfil);
      const i = calcIngesta(nutriData, planData, plan, cfg);

      setGasto(g);
      setIngesta(i);
      setMeta(parsedMeta);
      setPlanDataBal(planData);
      setLoading(false);
    };
    loadDay();
  }, [fecha, dia, user.id]);

  // Cargar semana para mini chart
  useEffect(() => {
    const loadWeek = async () => {
      const days = [1,2,3,4,5,6,0];
      const results = [];
      for(const d of days) {
        const f = getWeekDate(fecha, d);
        const eRes = await getEntreno(user.id, f, d);
        const ej = eRes.data?.ejercicios || {};
        let pm = {};
        try { pm = JSON.parse(eRes.data?.notas || '{}'); } catch {}
        const pr = cfg.prog[d] || cfg.prog[1];
        const g = calcGasto(ej, pm, pr, perfil);

        const nRes = await getNutricion(user.id, f);
        const nd = nRes.data || {};
        let pd = {};
        try { pd = JSON.parse(nd._notasRaw || '{}').plan || {}; } catch {}
        const dt = cfg.getDayType(d);
        const pl = cfg.planes[dt];
        const ing = calcIngesta(nd, pd, pl, cfg);

        results.push({dia:d,fecha:f,gasto:g,ingesta:ing,label:DIAS[d]});
      }
      setWeekData(results);
    };
    loadWeek();
  }, [fecha, user.id]);

  if(loading) return React.createElement('div',{style:{textAlign:'center',padding:40,color:G.mu,fontFamily:'monospace',fontSize:12}},'Calculando balance...');

  const balance = ingesta ? (ingesta.kcal - (gasto?.tdee||0)) : 0;
  const protDemand = Math.round(perfil.protKg * perfil.peso);
  const protBalance = ingesta ? (ingesta.prot - protDemand) : 0;
  const sueno = parseFloat(meta.sueno)||0;
  const fPre = parseInt(meta.fPre)||0;
  const fPost = parseInt(meta.fPost)||0;
  const ePre = parseInt(meta.ePre)||0;

  // Barra de progreso helper
  const BarProg = ({label, val, max, color, unit}) => {
    const pct = max>0 ? Math.min(100, (val/max)*100) : 0;
    const over = val > max;
    return React.createElement('div',{style:{marginBottom:8}},
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:10,color:G.dim,marginBottom:3}},
        React.createElement('span',null,label),
        React.createElement('span',{style:{color:over?G.bad:color,fontWeight:700}},val+(unit||'')+(max>0?(' / '+max+(unit||'')):''))
      ),
      React.createElement('div',{style:{background:G.bg,borderRadius:4,height:8,overflow:'hidden'}},
        React.createElement('div',{style:{width:pct+'%',height:'100%',background:over?G.bad:color,borderRadius:4,transition:'width 0.5s'}})
      )
    );
  };

  // Mini bar chart semanal
  const WeekChart = () => {
    if(weekData.length===0) return null;
    const maxVal = Math.max(...weekData.map(d=>Math.max(d.gasto.tdee,d.ingesta.kcal)),1);
    return React.createElement('div',{style:{marginTop:6}},
      React.createElement('div',{style:{display:'flex',gap:4,alignItems:'flex-end',height:80}},
        weekData.map((d,i) => {
          const gH = Math.max(2,(d.gasto.tdee/maxVal)*70);
          const iH = Math.max(2,(d.ingesta.kcal/maxVal)*70);
          const isSel = d.fecha===fecha;
          return React.createElement('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1,cursor:'pointer',opacity:isSel?1:0.7},onClick:()=>{setFecha(d.fecha);setDia(d.dia);}},
            React.createElement('div',{style:{display:'flex',gap:1,alignItems:'flex-end',height:72}},
              React.createElement('div',{style:{width:8,height:gH,background:G.bad+'cc',borderRadius:2}}),
              React.createElement('div',{style:{width:8,height:iH,background:G.ok+'cc',borderRadius:2}})
            ),
            React.createElement('div',{style:{fontSize:7,color:isSel?G.acc:G.mu,fontWeight:isSel?700:400,fontFamily:'monospace'}},d.label)
          );
        })
      ),
      React.createElement('div',{style:{display:'flex',justifyContent:'center',gap:16,marginTop:6}},
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:8,color:G.mu}},
          React.createElement('div',{style:{width:8,height:8,background:G.bad+'cc',borderRadius:2}}), 'Gasto'
        ),
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:8,color:G.mu}},
          React.createElement('div',{style:{width:8,height:8,background:G.ok+'cc',borderRadius:2}}), 'Ingesta'
        )
      )
    );
  };

  // Indicador de recuperacion
  const getRecoveryScore = () => {
    let score = 50; // base
    if(sueno>=7) score+=20; else if(sueno>=6) score+=10; else if(sueno>0) score-=10;
    if(protBalance>=0) score+=15; else score-=10;
    if(balance>=-300 && balance<=200) score+=10; else score-=10;
    if(fPost<=5) score+=5; else score-=5;
    return Math.max(0,Math.min(100,score));
  };
  const recoveryScore = getRecoveryScore();
  const recoveryColor = recoveryScore>=70?G.ok:recoveryScore>=45?G.warn:G.bad;
  const recoveryLabel = recoveryScore>=70?'Buena recuperaci\u00F3n':recoveryScore>=45?'Recuperaci\u00F3n moderada':'Recuperaci\u00F3n comprometida';

  // Recomendaciones
  const recs = [];
  if(ingesta.fuente==='ninguna') recs.push({icon:'\u{1F4CB}',txt:'Sin datos de ingesta. Registra tus comidas en NUTRICION \u{2192} Plan del D\u00EDa',color:G.warn});
  if(gasto.setsN===0 && gasto.durMin===0) recs.push({icon:'\u{1F3CB}',txt:'Sin datos de entreno registrados. Ve a ENTRENO para registrar tu sesi\u00F3n.',color:G.mu});
  if(protBalance<-20) recs.push({icon:'\u{1F6A8}',txt:'D\u00E9ficit prote\u00EDco de '+Math.abs(protBalance)+'g. Prioriza prote\u00EDna para no perder m\u00FAsculo.',color:G.bad});
  if(balance<-500) recs.push({icon:'\u{26A0}\u{FE0F}',txt:'D\u00E9ficit cal\u00F3rico severo (-'+Math.abs(balance)+' kcal). Riesgo de catabolismo y ca\u00EDda de energ\u00EDa.',color:G.bad});
  else if(balance<-200) recs.push({icon:'\u{1F50B}',txt:'D\u00E9ficit moderado (-'+Math.abs(balance)+' kcal). Ok para recomp si prote\u00EDna est\u00E1 cubierta.',color:G.warn});
  else if(balance>300) recs.push({icon:'\u{26A1}',txt:'Super\u00E1vit de +'+balance+' kcal. Cuidar si el objetivo es mantener definici\u00F3n.',color:G.warn});
  if(sueno>0 && sueno<6) recs.push({icon:'\u{1F634}',txt:'Sue\u00F1o cr\u00EDtico ('+sueno+'h). La recuperaci\u00F3n muscular requiere m\u00EDnimo 7h. Magnesio + ashwagandha PM.',color:G.bad});
  else if(sueno>0 && sueno<7) recs.push({icon:'\u{1F31C}',txt:'Sue\u00F1o bajo ('+sueno+'h). Vigilar fatiga acumulada esta semana.',color:G.warn});
  // ── Coach nutricional: Alcohol ──
  if(ingesta.alcG>0) {
    const alcKcal = Math.round(ingesta.alcG*7);
    const alcPct = Math.round(alcKcal/ingesta.kcal*100);
    recs.push({icon:'\u{1F37A}',txt:'Consumo de alcohol: '+ingesta.alcG+'g ('+alcKcal+' kcal, '+alcPct+'% del total). El alcohol inhibe s\u00EDntesis proteica hasta 24h y afecta calidad de sue\u00F1o.',color:'#ef4444'});
    if(ingesta.alcG>30) recs.push({icon:'\u{1F6A8}',txt:'Consumo elevado de alcohol (>30g). Ma\u00F1ana reducir carga de entreno 20-30%. Priorizar hidrataci\u00F3n y electrolitos.',color:G.bad});
    if(ingesta.alcG>15 && gasto.setsN>0) recs.push({icon:'\u{1F4A7}',txt:'Alcohol + entreno intenso = recuperaci\u00F3n comprometida. Tomar 500ml agua extra + glutamina + zinc antes de dormir.',color:G.warn});
  }
  // ── Coach nutricional: Balance macros ──
  if(ingesta.fuente!=='ninguna' && ingesta.kcal>0) {
    const protPct = Math.round(ingesta.prot*4/ingesta.kcal*100);
    const carbPct = Math.round(ingesta.carbs*4/ingesta.kcal*100);
    const grasaPct = Math.round(ingesta.grasa*9/ingesta.kcal*100);
    if(protPct<20) recs.push({icon:'\u{1F969}',txt:'Prote\u00EDna solo '+protPct+'% de calor\u00EDas (ideal >25% para mantener m\u00FAsculo). Agrega prote\u00EDna en pr\u00F3xima comida.',color:G.warn});
    if(carbPct>55 && cfg.metas.tipo!=='bulk') recs.push({icon:'\u{1F35E}',txt:'Carbohidratos al '+carbPct+'% (elevado). Considerar reducir porciones de arroz/pasta y aumentar vegetales.',color:G.warn});
    if(grasaPct>50) recs.push({icon:'\u{1F9C8}',txt:'Grasa al '+grasaPct+'% de calor\u00EDas. Dentro de rango keto si es intencional, pero vigilar calor\u00EDas totales.',color:G.mu});
    if(ingesta.kcal>0 && ingesta.prot>=protDemand && ingesta.kcal<=gasto.tdee+100 && (ingesta.alcG||0)===0) {
      recs.push({icon:'\u{2705}',txt:'\u{1F4AA} D\u00EDa s\u00F3lido. Prote\u00EDna cubierta ('+ingesta.prot+'g/'+protDemand+'g), balance energ\u00E9tico correcto, sin alcohol.',color:G.ok});
    }
  }
  if(protBalance>=0 && balance>=-300 && sueno>=7 && (ingesta.alcG||0)===0) recs.push({icon:'\u{1F31F}',txt:'Excelente d\u00EDa integral: macros, energ\u00EDa y sue\u00F1o alineados. Mant\u00E9n esta consistencia.',color:G.ok});

  // ── Coach Hol\u00EDstico: alimentos → SNC/sue\u00F1o/ansiedad/temblores → ajuste entreno ──
  const holisticRecs = holisticFoodCoach(planDataBal, user.id, dayType, ingesta, sueno, meta);

  return React.createElement('div',null,
    React.createElement(NavSemana,{fecha,setFecha,dia,setDia}),

    // TITULO
    React.createElement(Sec,{color:G.acc},
      React.createElement('div',{style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:G.acc,fontWeight:700,marginBottom:6}},'\u{1F4CA} BALANCE GASTO vs INGESTA'),
      React.createElement('div',{style:{fontSize:11,color:G.dim}}, (plan?plan.label:'D\u00EDa') + ' \u2022 ' + fmtFecha(fecha))
    ),

    // GASTO CALORICO
    React.createElement(Sec,{color:G.bad},
      React.createElement('div',{style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:G.bad,fontWeight:700,marginBottom:10}},'\u{1F525} GASTO CAL\u00D3RICO ESTIMADO'),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,textAlign:'center',marginBottom:12}},
        [{l:'TDEE Total',v:gasto.tdee,c:G.bad},{l:'TMB Basal',v:gasto.tmb,c:G.mu},{l:'Entreno (EAT)',v:gasto.totalEAT,c:'#f97316'}].map((x,i) =>
          React.createElement('div',{key:i,style:{background:G.bg,borderRadius:10,padding:'10px 6px',border:'1px solid '+G.bor}},
            React.createElement('div',{style:{fontSize:18,fontWeight:800,color:x.c,fontFamily:'monospace'}},x.v),
            React.createElement('div',{style:{fontSize:8,color:G.mu,marginTop:2}},x.l+' kcal')
          )
        )
      ),
      gasto.setsN>0 && React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6,textAlign:'center'}},
        [{l:'Tonnage',v:gasto.tonnage>1000?(gasto.tonnage/1000).toFixed(1)+'t':gasto.tonnage+'kg'},{l:'Sets',v:gasto.setsN},{l:'Dur',v:gasto.durMin+'min'},{l:'RPE avg',v:gasto.avgRPE}].map((x,i) =>
          React.createElement('div',{key:i,style:{background:G.alt,borderRadius:8,padding:'6px 4px'}},
            React.createElement('div',{style:{fontSize:13,fontWeight:700,color:G.dim,fontFamily:'monospace'}},x.v),
            React.createElement('div',{style:{fontSize:7,color:G.mu}},x.l)
          )
        )
      ),
      gasto.setsN>0 && React.createElement('div',{style:{marginTop:8,fontSize:9,color:G.mu,fontFamily:'monospace',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4}},
        React.createElement('span',null,'Aerobico: '+gasto.eat+' kcal'),
        React.createElement('span',null,'Mec\u00E1nico: '+gasto.tBonus+' kcal'),
        React.createElement('span',null,'EPOC: '+gasto.epoc+' kcal')
      )
    ),

    // INGESTA NUTRICIONAL
    React.createElement(Sec,{color:G.ok},
      React.createElement('div',{style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:G.ok,fontWeight:700,marginBottom:10}},'\u{1F37D}\u{FE0F} INGESTA NUTRICIONAL'),
      ingesta.fuente==='ninguna'
        ? React.createElement('div',{style:{textAlign:'center',padding:16,color:G.mu,fontSize:12}},'Sin datos. Registra en NUTRICI\u00D3N \u{2192} Plan del D\u00EDa')
        : React.createElement('div',null,
            React.createElement('div',{style:{display:'grid',gridTemplateColumns:ingesta.alcG>0?'1fr 1fr 1fr 1fr 1fr':'1fr 1fr 1fr 1fr',gap:8,textAlign:'center',marginBottom:10}},
              [{l:'Prote\u00EDna',v:ingesta.prot,u:'g',c:G.acc},{l:'Carbos',v:ingesta.carbs,u:'g',c:G.warn},{l:'Grasa',v:ingesta.grasa,u:'g',c:G.coa},{l:'Kcal',v:ingesta.kcal,u:'',c:G.dim}].concat(
                ingesta.alcG>0?[{l:'Alcohol',v:ingesta.alcG,u:'g',c:'#ef4444'}]:[]
              ).map((x,i) =>
                React.createElement('div',{key:i,style:{background:G.bg,borderRadius:10,padding:'10px 6px',border:'1px solid '+(x.l==='Alcohol'?'#ef4444':G.bor)}},
                  React.createElement('div',{style:{fontSize:ingesta.alcG>0?15:18,fontWeight:800,color:x.c,fontFamily:'monospace'}},x.v),
                  React.createElement('div',{style:{fontSize:8,color:G.mu,marginTop:2}},x.l+(x.u?' ('+x.u+')':''))
                )
              )
            ),
            ingesta.alcG>0 && React.createElement('div',{style:{background:'#ef444422',border:'1px solid #ef444466',borderRadius:8,padding:'6px 10px',marginBottom:8,fontSize:10,color:'#fca5a5',textAlign:'center'}},
              '\u{26A0}\u{FE0F} Alcohol: '+ingesta.alcG+'g = '+Math.round(ingesta.alcG*7)+' kcal vac\u00EDas (no aportan nutrientes, inhiben recuperaci\u00F3n muscular)'
            ),
            React.createElement('div',{style:{fontSize:9,color:G.mu,textAlign:'center',fontFamily:'monospace'}},'Fuente: '+(ingesta.fuente==='tracker'?'Tracker de alimentos':ingesta.fuente==='plan'?'Plan del D\u00EDa (checklist)':'Registro manual'))
          )
    ),

    // BALANCE ENERGETICO
    React.createElement(Sec,{color:balance>=0?G.ok:Math.abs(balance)>400?G.bad:G.warn},
      React.createElement('div',{style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:balance>=0?G.ok:G.warn,fontWeight:700,marginBottom:10}},'\u{2696}\u{FE0F} BALANCE ENERG\u00C9TICO'),
      React.createElement('div',{style:{textAlign:'center',marginBottom:12}},
        React.createElement('div',{style:{fontSize:32,fontWeight:900,color:balance>=0?G.ok:Math.abs(balance)>400?G.bad:G.warn,fontFamily:'monospace'}},
          (balance>=0?'+':'')+balance+' kcal'
        ),
        React.createElement('div',{style:{fontSize:11,color:G.mu}},
          balance>=0?'Super\u00E1vit cal\u00F3rico':'D\u00E9ficit cal\u00F3rico'
        )
      ),
      BarProg({label:'Calor\u00EDas',val:ingesta.kcal,max:gasto.tdee,color:G.warn,unit:' kcal'}),
      BarProg({label:'Prote\u00EDna',val:ingesta.prot,max:protDemand,color:G.acc,unit:'g'}),
      BarProg({label:'Carbos',val:ingesta.carbs,max:cfg.metas.carbs,color:G.warn,unit:'g'}),
      BarProg({label:'Grasa',val:ingesta.grasa,max:cfg.metas.grasa,color:G.coa,unit:'g'})
    ),

    // RECUPERACION
    React.createElement(Sec,{color:recoveryColor},
      React.createElement('div',{style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:recoveryColor,fontWeight:700,marginBottom:10}},'\u{1F9EC} RECUPERACI\u00D3N MUSCULAR'),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:16,marginBottom:12}},
        React.createElement('div',{style:{position:'relative',width:64,height:64}},
          React.createElement('svg',{width:64,height:64,viewBox:'0 0 64 64'},
            React.createElement('circle',{cx:32,cy:32,r:28,fill:'none',stroke:G.bor,strokeWidth:4}),
            React.createElement('circle',{cx:32,cy:32,r:28,fill:'none',stroke:recoveryColor,strokeWidth:4,strokeDasharray:176,strokeDashoffset:176-(176*recoveryScore/100),strokeLinecap:'round',transform:'rotate(-90 32 32)',style:{transition:'stroke-dashoffset 0.8s'}})
          ),
          React.createElement('div',{style:{position:'absolute',top:0,left:0,width:64,height:64,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:recoveryColor,fontFamily:'monospace'}},recoveryScore+'%')
        ),
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:13,fontWeight:700,color:recoveryColor}},recoveryLabel),
          React.createElement('div',{style:{fontSize:10,color:G.mu,marginTop:4}},
            'Sue\u00F1o: '+(sueno>0?sueno+'h':'\u2014')+' \u2022 Fatiga: '+(fPost>0?fPost+'/10':'\u2014')+' \u2022 Energ\u00EDa: '+(ePre>0?ePre+'/10':'\u2014')
          ),
          React.createElement('div',{style:{fontSize:10,color:G.mu,marginTop:2}},
            'Prote\u00EDna: '+ingesta.prot+'/'+protDemand+'g ('+(protBalance>=0?'+':'')+protBalance+'g)'
          )
        )
      ),
      React.createElement('div',{style:{fontSize:10,color:G.dim,background:G.bg,borderRadius:8,padding:'8px 10px',border:'1px solid '+G.bor}},
        protBalance<0
          ? '\u{26A0}\u{FE0F} Necesitas '+Math.abs(protBalance)+'g m\u00E1s de prote\u00EDna para cubrir la demanda de reparaci\u00F3n muscular. Prioriza carne, huevos o prote\u00EDna post.'
          : '\u{2705} Prote\u00EDna cubierta. La reparaci\u00F3n muscular tiene sustrato suficiente.'
      )
    ),

    // GRAFICO SEMANAL
    React.createElement(Sec,{color:G.acc},
      React.createElement('div',{style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:G.acc,fontWeight:700,marginBottom:6}},'\u{1F4C8} SEMANA'),
      React.createElement(WeekChart,null)
    ),

    // RECOMENDACIONES
    recs.length>0 && React.createElement(Sec,{color:G.coa},
      React.createElement('div',{style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:G.coa,fontWeight:700,marginBottom:8}},'\u{1F4A1} RECOMENDACIONES'),
      recs.map((r,i) => React.createElement('div',{key:i,style:{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6,padding:'6px 8px',background:G.bg,borderRadius:8,border:'1px solid '+r.color+'44'}},
        React.createElement('span',{style:{fontSize:14,flexShrink:0}},r.icon),
        React.createElement('span',{style:{fontSize:11,color:r.color,lineHeight:'1.4'}},r.txt)
      ))
    ),

    // COACH HOLISTICO: SNC / Sue\u00F1o / Ansiedad / Temblores
    holisticRecs.length>0 && React.createElement(Sec,{color:'#a855f7'},
      React.createElement('div',{style:{fontSize:10,fontFamily:'monospace',letterSpacing:2,color:'#a855f7',fontWeight:700,marginBottom:4}},'\u{1F9E0} AN\u00C1LISIS HOL\u00CDSTICO'),
      React.createElement('div',{style:{fontSize:9,color:G.mu,marginBottom:10}},'Impacto de alimentos consumidos en SNC, sue\u00F1o, ansiedad y temblor'),
      holisticRecs.map((r,i) => React.createElement('div',{key:'h'+i,style:{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8,padding:'8px 10px',background:G.bg,borderRadius:10,border:'1px solid '+r.color+'33',borderLeft:'3px solid '+r.color}},
        React.createElement('span',{style:{fontSize:14,flexShrink:0}},r.icon),
        React.createElement('span',{style:{fontSize:11,color:r.color==='#ef4444'?'#fca5a5':r.color===G.ok?'#86efac':r.color,lineHeight:'1.5'}},r.txt)
      ))
    )
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
const TABS = [
  {id:'entreno', label:'ENTRENO', icon:'H'},
  {id:'nutri', label:'NUTRICION', icon:'N'},
  {id:'balance', label:'BALANCE', icon:'B'},
  {id:'progreso', label:'PROGRESO', icon:'P'}
];

function UserSelector({onSelect}) {
  const users = [
    {id:ARIEL_ID, nombre:'Ariel', desc:'49 a\u00F1os \u2022 CrossFit + Pesas \u2022 Keto flexible', color:'#a5b4fc', icon:'\u{1F3CB}'},
    {id:MELISSA_ID, nombre:'Melissa', desc:'45 a\u00F1os \u2022 Gym casa + Yoga \u2022 Keto fase 2', color:'#f0abfc', icon:'\u{1F9D8}'}
  ];
  return React.createElement('div', {style:{background:G.bg,minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20,backgroundImage:'radial-gradient(ellipse at 20% 0%,#312e8133 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,#581c8722 0%,transparent 50%)'}},
    React.createElement('div', {style:{fontFamily:'monospace',fontSize:14,fontWeight:700,letterSpacing:4,color:G.acc,marginBottom:6}}, 'FITTRACKER'),
    React.createElement('div', {style:{fontSize:12,color:G.mu,marginBottom:30}}, 'Selecciona tu perfil'),
    users.map(u =>
      React.createElement('button', {key:u.id, onClick:()=>onSelect(u.id), style:{background:G.sur+'cc',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',border:'2px solid '+u.color+'55',borderRadius:20,padding:'24px 30px',marginBottom:16,width:'100%',maxWidth:340,cursor:'pointer',textAlign:'left',boxShadow:'0 4px 24px rgba(0,0,0,0.25)',transition:'transform 0.15s,border-color 0.2s'}},
        React.createElement('div', {style:{display:'flex',alignItems:'center',gap:14}},
          React.createElement('div', {style:{fontSize:36}}, u.icon),
          React.createElement('div', null,
            React.createElement('div', {style:{fontSize:18,fontWeight:700,color:u.color,marginBottom:4}}, u.nombre),
            React.createElement('div', {style:{fontSize:12,color:G.dim}}, u.desc)
          )
        )
      )
    )
  );
}

function App() {
  const [userId, setUserId] = useState(null);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState('entreno');
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    if(!userId) return;
    setLoading(true);
    autoAuth(userId).then(u => { setUser(u); setLoading(false); });
  }, [userId]);

  if(!userId) return React.createElement(UserSelector, {onSelect:setUserId});

  if(loading || !user) return (
    React.createElement('div', {style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:G.bg,color:G.mu,fontFamily:'monospace',fontSize:12}},
      'Cargando...'
    )
  );

  const cfg = USER_CFG[userId] || USER_CFG[ARIEL_ID];

  return (
    React.createElement('div', {style:{background:G.bg,minHeight:'100vh',maxWidth:640,margin:'0 auto'}},
      React.createElement('div', {style:{background:G.sur+'ee',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:'1px solid '+G.bor,padding:'10px 16px 0',position:'sticky',top:0,zIndex:10,boxShadow:'0 2px 16px rgba(0,0,0,0.3)'}},
        React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
          React.createElement('div', {style:{fontFamily:'monospace',fontSize:12,fontWeight:700,letterSpacing:3,color:G.acc}}, 'FITTRACKER'),
          React.createElement('button', {onClick:()=>{setUserId(null);setUser(null);setTab('entreno');}, style:{background:'none',border:'1px solid '+G.bor,borderRadius:6,padding:'3px 10px',fontSize:11,color:cfg.nombre==='Melissa'?'#f0abfc':G.ok,cursor:'pointer',fontFamily:'monospace'}}, cfg.nombre + ' \u{25BC}')
        ),
        React.createElement('div', {style:{display:'flex',gap:2}},
          TABS.map(t => (
            React.createElement('button', {key:t.id, onClick:()=>setTab(t.id), style:{background:'none',color:tab===t.id?G.acc:G.mu,borderBottom:'2px solid '+(tab===t.id?G.acc:'transparent'),padding:'5px 14px',fontSize:10,fontWeight:700,fontFamily:'monospace',letterSpacing:1,border:'none',cursor:'pointer'}},
              t.label
            )
          ))
        )
      ),
      React.createElement('div', {style:{padding:14}},
        tab==='entreno' && React.createElement(TabEntreno, {user:user, cfg:cfg}),
        tab==='nutri' && React.createElement(TabNutricion, {user:user, cfg:cfg}),
        tab==='balance' && React.createElement(TabBalance, {user:user, cfg:cfg}),
        tab==='progreso' && React.createElement(TabProgreso, {user:user})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
